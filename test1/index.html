<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>متجر روابط الأفلييت 🔗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="light-mode">

    <div class="container">
        <header>
            <h1>متجري الخاص 📦</h1>
            <button id="themeToggle" onclick="toggleTheme()">🌙</button>
        </header>

        <section class="admin-panel">
            <div class="input-group">
                <input type="text" id="prodTitle" placeholder="عنوان المنتج">
                <input type="text" id="prodLink" placeholder="رابط الأفلييت">
                <input type="text" id="prodImg" placeholder="رابط الصورة أو الفيديو">
                <select id="prodCategory">
                    <option value="all">التصنيف</option>
                    <option value="tech">تقنية</option>
                    <option value="fashion">أزياء</option>
                    <option value="home">منزل</option>
                </select>
                <button onclick="addLink()">إضافة للمتجر +</button>
            </div>
        </section>

        <div class="filter-bar">
            <input type="text" id="searchInput" onkeyup="searchLinks()" placeholder="ابحث عن منتج...">
        </div>

        <div class="grid-container" id="linksGrid">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
