<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card</title>
    <link rel="icon" type="image/png" href="assets/logo.png">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/chat-float.css">
    <link rel="stylesheet" href="css/checkout.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
    <div class="logo">
        <img src="assets/logo.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain; border-radius:8px; margin-right:8px; vertical-align:middle;">
        Seconds<span>Card</span>
    </div>
</a>
            
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="ابحث عن بطاقة...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="header-actions">
                <button id="theme-toggle" class="action-btn"><i class="fas fa-moon"></i></button>
                
                <a href="cart.html" class="action-btn"><i class="fas fa-shopping-cart"></i></a>

                <div class="user-menu-container">
                    <button class="action-btn" id="user-icon-btn">
                        <i class="fas fa-user-circle"></i>
                    </button>

                    <div class="dropdown-menu" id="user-dropdown">
                        <nav class="dropdown-nav">
                            <a href="orders.html"><i class="fas fa-box"></i> طلباتي</a>
                            <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                            <a href="profile.html"><i class="fas fa-user"></i> حسابي</a>
                            <hr>
                            <button onclick="handleLogout()" class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

<main class="checkout-container">
    <div class="checkout-card">
        <h2><i class="fas fa-shield-alt"></i> مراجعة الدفع</h2>
        
        <div class="payment-summary">
            <div class="summary-line">
                <span>إجمالي المشتريات:</span>
                <span id="checkout-total">0 MRU</span>
            </div>
            <div class="summary-line wallet-balance-line">
                <span>رصيد محفظتك الحالي:</span>
                <span id="current-wallet-balance">0 MRU</span>
            </div>
        </div>

        <!-- طرق الدفع -->
        <div id="payment-methods-section" style="margin: 20px 0;">
            <h3 style="margin-bottom: 12px; font-size: 16px;"><i class="fas fa-wallet"></i> اختر طريقة الدفع</h3>
            <div id="payment-methods-list" style="display:flex; flex-wrap:wrap; gap:12px;">
                <p style="color:#888;">جاري تحميل طرق الدفع...</p>
            </div>
            <div id="selected-method-info" style="display:none; margin-top:15px; background:#1e293b; border-radius:10px; padding:15px;">
                <p style="margin:0; color:#94a3b8; font-size:14px;">رقم الحساب:</p>
                <p id="selected-account" style="margin:5px 0 0; font-size:18px; font-weight:bold; color:#f97316;"></p>
            </div>
        </div>

        <div id="receipt-upload-section" style="display:none; margin-top:15px;">
    <h3 style="font-size:15px; margin-bottom:10px;"><i class="fas fa-receipt"></i> ارفع إيصال الدفع</h3>
    <input type="file" id="receipt-input" accept="image/*" style="display:none">
    <div onclick="document.getElementById('receipt-input').click()" 
         style="border:2px dashed #f97316; border-radius:12px; padding:20px; text-align:center; cursor:pointer;">
        <i class="fas fa-upload" style="font-size:24px; color:#f97316;"></i>
        <p style="margin:8px 0 0; color:#94a3b8;">اضغط لرفع صورة الإيصال</p>
    </div>
    <img id="receipt-preview" src="" style="display:none; width:100%; border-radius:10px; margin-top:10px;">
</div>

        <div id="payment-status-msg"></div>
        <button id="confirm-payment-btn" class="pay-now-btn">
    تأكيد الدفع الآن
</button>
        
        <p class="security-note"><i class="fas fa-lock"></i> سيتم خصم المبلغ من محفظتك فوراً وتصلك أكواد البطاقات في "طلباتي".</p>
    </div>
</main>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="toggleChatWidget()" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/checkout.js"></script>
<script type="module" src="js/chat-float.js"></script>
</body>
</html>
