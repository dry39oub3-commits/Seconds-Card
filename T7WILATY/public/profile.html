<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store-Card</title>
    <link rel="icon" type="image/png" href="assets/Icon.png">    

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/chat-float.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script>
    (function(){
        const t = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', t);
    })();
</script>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-link" style="text-decoration:none;">
                <div class="logo" style="display:flex; align-items:center; gap:10px;">
                    <img src="assets/Icon.png" alt="StoreCard" style="height:40px; width:40px; object-fit:contain;">
                    <div style="display:flex; flex-direction:column; line-height:1.1;">
                        <span style="font-size:18px; font-weight:800; color:white;">Store<span style="color:#f97316;">Card</span></span>
                    </div>
                </div>
            </a>
            
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="ابحث عن بطاقة...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="header-actions">
                <button id="theme-toggle" class="action-btn"><i class="fas fa-moon"></i></button>
                <a href="cart.html" class="action-btn"><i class="fas fa-shopping-cart"></i></a>

                <div class="user-menu-container">
                    <button class="action-btn" id="user-icon-btn">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <div class="dropdown-menu" id="user-dropdown">
                        <nav class="dropdown-nav">
                            <a href="orders.html"><i class="fas fa-box"></i> طلباتي</a>
                            <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                            <a href="profile.html"><i class="fas fa-user"></i> حسابي</a>
                            <hr>
                            <button onclick="handleLogout()" class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar-container">
                    <div class="profile-avatar" id="avatar-container">
                        <i class="fas fa-user-circle" id="default-avatar-icon"></i>
                        <img id="user-display-photo" src="" alt="" style="display:none; border-radius:50%">
                    </div>
                    <input type="file" id="photo-input" accept="image/*" style="display:none">
                    <button class="edit-photo-btn" onclick="triggerPhotoUpload()"><i class="fas fa-camera"></i></button>
                </div>

                <div class="edit-name-container">
                    <input type="text" id="user-display-name" class="profile-name-input" value="جاري التحميل..." required>
                    <i class="fas fa-pencil-alt edit-icon-hint"></i>
                </div>

                <p id="user-display-email">--</p>
                <button id="save-profile-btn" class="save-btn" onclick="updateProfileData()" style="display:none;">حفظ التعديلات</button>
            </div>

            <div class="profile-details">
                <div class="detail-item">
                    <span>رقم التعريف (UID):</span>
                    <small id="user-uid">--</small>
                </div>
                <div class="detail-item">
                    <span>اسم المستخدم:</span>
                    <span id="user-name">--</span>
                </div>
                <div class="detail-item">
                    <span>تاريخ الانضمام:</span>
                    <span id="user-joined">--</span>
                </div>
            </div>

            <div class="profile-actions">
                <button onclick="handleLogout()" class="logout-full-btn">
                    <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                </button>
            </div>
        </div>
    </main>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="toggleChatWidget()" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/public-header.js"></script>
<script type="module" src="js/chat-float.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="module" src="js/profile.js"></script>
</body>
</html>
