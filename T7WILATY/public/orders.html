<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store-Card</title>
    <link rel="icon" type="image/png" href="assets/Icon.png">    

    <link rel="stylesheet" href="css/index.css?v=2">
    <link rel="stylesheet" href="css/orders.css?v=2">
    <link rel="stylesheet" href="css/chat-float.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=2">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
<a href="index.html" class="logo-link" style="text-decoration:none;">
    <div class="logo" style="display:flex; align-items:center; gap:10px;">
        <img src="assets/Icon.png" alt="Store-Card" style="height:40px; width:40px; object-fit:contain;">
        <div style="display:flex; flex-direction:column; line-height:1.1;">
            <span style="font-size:18px; font-weight:800; color:white;">Store<span style="color:#f97316;">Card</span></span>
        </div>
    </div>
</a>
            
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="ابحث عن بطاقة...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="header-actions">
                <button id="settings-btn" class="action-btn" onclick="openSettingsModal()">
                    <i class="fas fa-globe"></i>
                </button>
                <button id="theme-toggle" class="action-btn"><i class="fas fa-moon"></i></button>
                <a href="cart.html" class="action-btn"><i class="fas fa-shopping-cart"></i></a>

                <div class="user-menu-container">
                    <button class="action-btn" id="user-icon-btn">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <div class="dropdown-menu" id="user-dropdown">
                        <nav class="dropdown-nav">
                            <a href="orders.html"><i class="fas fa-box"></i> طلباتي</a>
                            <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                            <a href="profile.html"><i class="fas fa-user"></i> حسابي</a>
                            <hr>
                            <button onclick="handleLogout()" class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="orders-container">
        <h2 class="page-title"><i class="fas fa-shopping-bag"></i> سجل طلباتي</h2>
        
        <!-- شريط الفلاتر والبحث -->
<div id="orders-filters" style="
    display:flex; flex-wrap:wrap; gap:8px; margin-bottom:16px;
    padding:0 4px; align-items:center;">

    <!-- بحث برقم الطلب -->
    <div style="flex:1; min-width:180px; position:relative;">
        <input type="text" id="order-search" placeholder="🔍 ابحث برقم الطلب..."
            oninput="filterOrders()"
            style="width:100%; padding:9px 14px; background:#1e293b;
                   border:1px solid #334155; border-radius:8px; color:#e2e8f0;
                   font-family:inherit; font-size:13px; box-sizing:border-box;">
    </div>

    <!-- أزرار الفلتر -->
    <div style="display:flex; gap:6px; flex-wrap:wrap;">
        <button onclick="setOrderFilter('all', this)" class="order-filter-btn active-filter"
            style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
                   font-size:12px; font-weight:700; font-family:inherit;
                   background:rgba(249,115,22,0.15); color:#f97316; border:1px solid #f97316;">
            كل الحالات
        </button>
        <button onclick="setOrderFilter('مكتمل', this)" class="order-filter-btn"
            style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
                   font-size:12px; font-weight:700; font-family:inherit;
                   background:rgba(34,197,94,0.1); color:#22c55e; border:1px solid rgba(34,197,94,0.3);">
            ✅ مكتمل
        </button>
        <button onclick="setOrderFilter('مسترد', this)" class="order-filter-btn"
            style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
                   font-size:12px; font-weight:700; font-family:inherit;
                   background:rgba(245,158,11,0.1); color:#f59e0b; border:1px solid rgba(245,158,11,0.3);">
            ↩️ مسترد
        </button>
        <button onclick="setOrderFilter('ملغي', this)" class="order-filter-btn"
            style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
                   font-size:12px; font-weight:700; font-family:inherit;
                   background:rgba(239,68,68,0.1); color:#ef4444; border:1px solid rgba(239,68,68,0.3);">
            ❌ ملغي
        </button>
        <button onclick="setOrderFilter('pending', this)" class="order-filter-btn"
            style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;
                   font-size:12px; font-weight:700; font-family:inherit;
                   background:rgba(148,163,184,0.1); color:#94a3b8; border:1px solid rgba(148,163,184,0.3);">
            ⏳ قيد الانتظار
        </button>
    </div>
</div>

        <div id="orders-list" class="orders-list">
            <div class="loading-spinner">جاري تحميل طلباتك...</div>
        </div>

        <div id="no-orders" style="display:none; text-align:center; padding:50px;">
            <i class="fas fa-box-open" style="font-size: 60px; color: #334155; margin-bottom: 20px;"></i>
            <p>لا توجد طلبات سابقة حتى الآن.</p>
            <a href="index.html" class="shop-now-btn">تصفح البطاقات الآن</a>
        </div>
    </main>
    
<!-- تفعيل الصوت عند أول تفاعل -->
<div id="audio-unlock" onclick="this.remove()" style="display:none;"></div>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="toggleChatWidget()" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/public-header.js?v=2"></script>
<script type="module" src="js/chat-float.js?v=2"></script>
    <script type="module" src="js/orders.js?v=2"></script>
</body>
</html>
