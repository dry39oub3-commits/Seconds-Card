<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الإحصائيات | Seconds-Card</title>
    
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="admin-top-header">
    <div class="header-container">
        <div class="logo">
    <a href="dashboard.html" style="text-decoration: none; color: inherit;">
        Seconds<span>Card</span>
    </a>
</div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> الإحصائيات</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i> طرق الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="addcard.html" class="nav-link"><i class="fas fa-plus-circle"></i> إضافة منتج</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i> إدارة المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div style="position:relative; display:inline-block; margin-left:15px;">
    <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
        <i class="fas fa-bell"></i>
        <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
    </button>
</div>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

    <main class="dashboard-main-area">
    <section class="section-header">
        <h2><i class="fas fa-tachometer-alt"></i> مؤشرات الأداء الرئيسية</h2>
    </section>

    <div class="stats-grid">
        <div class="stat-card" style="color: #03a9f4;"> <div class="stat-icon" style="background: #e1f5fe;">
                <i class="fas fa-money-bill-wave"></i>
            </div>
            <div class="stat-info">
                <h3>إجمالي المبيعات</h3>
                <p class="stat-value">
                    <span id="total-sales">0</span>
                    <small>MRU</small>
                </p>
            </div>
        </div>

        <div class="stat-card" style="color: #4caf50;">
            <div class="stat-icon" style="background: #e8f5e9;">
                <i class="fas fa-check-circle"></i>
            </div>
            <div class="stat-info">
                <h3>الطلبات المنجزة</h3>
                <p class="stat-value" id="orders-count">0</p>
            </div>
        </div>

        <div class="stat-card" style="color: #ff9800;">
            <div class="stat-icon" style="background: #fff3e0;">
                <i class="fas fa-users"></i>
            </div>
            <div class="stat-info">
                <h3>إجمالي المستخدمين</h3>
                <p class="stat-value" id="users-count">0</p>
            </div>
        </div>
    </div>
</main>
<script type="module" src="./js/bell.js"></script>
    <script type="module" src="./js/stats.js"></script>
</body>
</html>
