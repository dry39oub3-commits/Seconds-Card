<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الأوصاف | StoreCard</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">    

    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
    --bg-base:        #f0f4f8;
    --bg-card:        #ffffff;
    --bg-input:       #f8fafc;
    --bg-hover:       #e8eef5;
    --border:         #d1dce8;
    --border-focus:   #f97316;
    --text-primary:   #1e293b;
    --text-secondary: #475569;
    --text-muted:     #94a3b8;
    --accent:         #f97316;
    --accent-dim:     rgba(249,115,22,0.10);
    --accent-border:  rgba(249,115,22,0.30);
    --success:        #16a34a;
    --success-dim:    rgba(22,163,74,0.10);
    --success-border: rgba(22,163,74,0.30);
    --danger:         #dc2626;
    --danger-dim:     rgba(220,38,38,0.10);
    --danger-border:  rgba(220,38,38,0.25);
    --blue:           #2563eb;
    --radius-sm:      8px;
    --radius-md:      12px;
    --radius-lg:      16px;
    --shadow-hover:   0 8px 32px rgba(0,0,0,0.10);
    --transition:     0.2s ease;
}

[data-theme="dark"] {
    --bg-base:        #0a0f1a;
    --bg-card:        #111827;
    --bg-input:       #0d1424;
    --bg-hover:       #1a2535;
    --border:         #1e2d42;
    --border-focus:   #f97316;
    --text-primary:   #f1f5f9;
    --text-secondary: #94a3b8;
    --text-muted:     #475569;
    --accent:         #f97316;
    --accent-dim:     rgba(249,115,22,0.12);
    --accent-border:  rgba(249,115,22,0.25);
    --success:        #22c55e;
    --success-dim:    rgba(34,197,94,0.12);
    --success-border: rgba(34,197,94,0.25);
    --danger:         #ef4444;
    --danger-dim:     rgba(239,68,68,0.12);
    --danger-border:  rgba(239,68,68,0.25);
    --blue:           #3b82f6;
    --shadow-hover:   0 8px 32px rgba(0,0,0,0.5);
}

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
        }

        .page-container {
            max-width: 900px;
            margin: 32px auto;
            padding: 0 16px 80px;
        }

        /* ===== عنوان الصفحة ===== */
        .page-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .page-title i { color: var(--accent); }

        /* ===== بطاقة المنتج ===== */
        .desc-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            margin-bottom: 12px;
            overflow: hidden;
            transition: box-shadow var(--transition), border-color var(--transition);
        }

        .desc-card:hover {
            box-shadow: var(--shadow-hover);
            border-color: #2a3a52;
        }

        .desc-card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 15px 20px;
            cursor: pointer;
            user-select: none;
            transition: background var(--transition);
        }

        .desc-card-header:hover { background: var(--bg-hover); }

        .desc-card-header img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            background: white;
            border-radius: var(--radius-sm);
            padding: 4px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .img-placeholder {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .img-placeholder i { color: var(--text-muted); font-size: 16px; }

        .p-name {
            font-weight: 700;
            font-size: 14px;
            color: var(--text-primary);
            flex: 1;
        }

        .p-country {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .chevron {
            color: var(--text-muted);
            font-size: 12px;
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        /* ===== جسم البطاقة ===== */
        .desc-card-body {
            display: none;
            padding: 0 20px 20px;
            border-top: 1px solid var(--border);
        }

        .desc-card-body.open {
            display: block;
            animation: slideDown 0.2s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-6px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== الحقول ===== */
        .field-group { margin-top: 18px; }

        .field-label {
            font-size: 12px;
            color: var(--text-secondary);
            font-weight: 700;
            margin-bottom: 7px;
            display: flex;
            align-items: center;
            gap: 6px;
            letter-spacing: 0.3px;
        }

        textarea.desc-field {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            padding: 12px 14px;
            font-size: 13px;
            font-family: inherit;
            line-height: 1.9;
            resize: vertical;
            transition: border-color var(--transition), box-shadow var(--transition);
            direction: rtl;
        }

        textarea.desc-field:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(249,115,22,0.1);
        }

        textarea.desc-field::placeholder { color: var(--text-muted); }

        .field-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* ===== معاينة الخطوات ===== */
        .preview-box {
            margin-top: 10px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            padding: 12px 14px;
            font-size: 12px;
            display: none;
        }

        .preview-box.has-content { display: block; }

        .preview-step {
            display: flex;
            gap: 8px;
            margin-bottom: 6px;
            color: var(--text-secondary);
            align-items: flex-start;
        }

        .preview-step .num {
            color: var(--accent);
            font-weight: 800;
            flex-shrink: 0;
            min-width: 18px;
        }

        /* ===== الأزرار ===== */
        .save-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            transition: opacity var(--transition), transform var(--transition);
            font-family: inherit;
        }

        .save-btn:hover  { opacity: 0.88; transform: translateY(-1px); }
        .save-btn:active { transform: translateY(0); }

        .clear-btn {
            background: var(--danger-dim);
            color: var(--danger);
            border: 1px solid var(--danger-border);
            padding: 9px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: opacity var(--transition);
            font-family: inherit;
        }

        .clear-btn:hover { opacity: 0.8; }

        /* ===== شارات ===== */
        .saved-badge {
            display: none;
            align-items: center;
            gap: 5px;
            background: var(--success-dim);
            color: var(--success);
            border: 1px solid var(--success-border);
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
        }

        .status-badge {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            margin-left: 6px;
            flex-shrink: 0;
        }

        .badge-done {
            background: var(--success-dim);
            color: var(--success);
            border: 1px solid var(--success-border);
        }

        .badge-empty {
            background: var(--accent-dim);
            color: var(--accent);
            border: 1px solid var(--accent-border);
        }

        /* ===== التحميل ===== */
        .loading-text {
            text-align: center;
            color: var(--text-muted);
            padding: 60px 20px;
            font-size: 15px;
        }

        /* ===== Responsive ===== */
        @media (max-width: 600px) {
            .page-container { padding: 0 12px 60px; }
            .desc-card-header { padding: 12px 14px; gap: 10px; }
            .desc-card-body  { padding: 0 14px 16px; }
            .page-title { font-size: 17px; }
        }
    </style>

</head>
