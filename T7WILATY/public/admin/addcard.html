<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store-Card | AdminPanel</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">
    <link rel="stylesheet" href="./css/dashboard-main.css?v=2">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css?v=2">
    
<script type="module" src="./js/admin-guard.js?v=2"></script>
</head>
<body>

<header class="admin-top-header">
    <div class="header-container">
 
        <button class="hamburger-btn" id="hamburger-btn" aria-label="القائمة">
            <span></span><span></span><span></span>
        </button>
 
        <div class="logo">
            <a href="orders.html" style="text-decoration:none; color:inherit;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="../assets/Icon.png" alt="StoreCard" style="height:40px; width:40px; object-fit:contain;">
                    <div style="display:flex; flex-direction:column; line-height:1.1;">
                        <span style="font-size:18px; font-weight:800; color:white;">
                            Store<span style="color:#f97316;">Card</span>
                        </span>
                    </div>
                </div>
            </a>
        </div>
 
        <nav class="main-nav">
            <ul class="nav-list" id="main-nav-list">
                <li data-perm="all">
                    <a href="Slider-manager.html" class="nav-link">
                        <i class="fas fa-chart-line"></i> السلايدر
                    </a>
                </li>
                <li data-perm="view_wallets">
                    <a href="admin-wallet.html" class="nav-link">
                        <i class="fas fa-wallet"></i> المحافظ
                    </a>
                </li>
                <li data-perm="all">
                    <a href="payment-methods.html" class="nav-link">
                        <i class="fas fa-credit-card"></i> الدفع
                    </a>
                </li>
                <li data-perm="view_stats">
                    <a href="dashboard.html" class="nav-link">
                        <i class="fas fa-chart-bar"></i> الإحصائيات
                    </a>
                </li>
                <li data-perm="all">
                    <a href="products-manager.html" class="nav-link">
                        <i class="fas fa-box-open"></i> المنتجات
                    </a>
                </li>
                <li data-perm="manage_stock">
                    <a href="stocks.html" class="nav-link">
                        <i class="fas fa-layer-group"></i> المخزون
                    </a>
                </li>
                <li data-perm="view_completed">
                    <a href="completed-orders.html" class="nav-link">
                        <i class="fas fa-check-double"></i> الطلبات المكتملة
                    </a>
                </li>
            </ul>
        </nav>
 
        <div style="position:relative; display:inline-block; margin-left:15px;">
            <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
                <i class="fas fa-bell"></i>
                <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </button>
        </div>
 
        <button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
            <i class="fas fa-moon"></i>
        </button>
 
        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
 
    </div>
</header>

<div class="admin-container">
    <section class="form-section">
        <h2 class="section-title"><i class="fas fa-plus-circle"></i> إضافة منتج جديد</h2>
        
        <div class="input-group">
            <label for="mainProductName">اسم المنتج الرئيسي:</label>
            <input type="text" id="mainProductName" placeholder="مثال: iTunes Gift Card">
        </div>

        <div class="input-group">
    <label for="productCountry">تحديد الدولة (المنطقة):</label>
    <select id="productCountry" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; background: white; cursor: pointer;">
        <option value="Global">عالمي (Global)</option>
        
        <optgroup label="الدول المختارة">
            <option value="Saudi Arabia">السعودية (Saudi Arabia)</option>
            <option value="UAE">الإمارات (UAE)</option>
            <option value="USA">الولايات المتحدة (USA)</option>
            <option value="Turkey">تركيا (Turkey)</option>
            <option value="France">فرنسا (France)</option>
            <option value="Germany">ألمانيا (Germany)</option>
            <option value="Spain">إسبانيا (Spain)</option>
        </optgroup>
    </select>
</div>

        <div class="input-group">
            <label for="mainProductImage">رابط صورة المنتج:</label>
            <input type="url" id="mainProductImage" placeholder="https://...">
        </div>

        <div class="input-group">
            <label>فئات الأسعار والعملة (MRU):</label>
            <div id="prices-container"></div>
            <button type="button" class="btn-add-more" id="addPriceBtn">
                <i class="fas fa-tag"></i> إضافة فئة سعرية
            </button>
        </div>

        <button id="saveProductBtn" class="save-all-btn">
            <i class="fas fa-save"></i> حفظ ونشر المنتج
        </button>
    </section>
</div>

<!-- زر الدردشة العائم للأدمن -->
<div id="admin-chat-float-btn" onclick="toggleAdminChat()"
     style="position:fixed; bottom:24px; left:24px; width:52px; height:52px;
            background:#f97316; color:white; border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; box-shadow:0 4px 20px rgba(249,115,22,0.4);
            z-index:99997; transition:transform 0.2s;">
    <i class="fas fa-headset"></i>
    <span id="admin-chat-badge"
          style="display:none; position:absolute; top:-4px; right:-4px;
                 background:#ef4444; color:white; border-radius:50%;
                 width:18px; height:18px; font-size:10px; font-weight:800;
                 align-items:center; justify-content:center;"></span>
</div>
<script type="module" src="./js/admin-chat.js?v=2"></script>
<script type="module" src="./js/header.js?v=2"></script>
<script type="module" src="./js/bell.js?v=2"></script>
<script type="module" src="./js/add-card.js?v=2"></script>
</body>
</html>
