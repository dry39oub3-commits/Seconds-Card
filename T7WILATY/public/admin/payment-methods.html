</head>
<body>
<body>

        <header class="admin-top-header">
    <div class="header-container">
        <div class="logo">
    <a href="dashboard.html" style="text-decoration: none; color: inherit;">
        Seconds<span>Card</span>
    </a>
</div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="dashboard.html" class="nav-link"><i class="fas fa-chart-line"></i> الإحصائيات</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i> طرق الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="addcard.html" class="nav-link"><i class="fas fa-plus-circle"></i> إضافة منتج</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i> إدارة المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

    <div class="admin-container">
        <h1><i class="fas fa-credit-card"></i> إدارة طرق الدفع</h1>

        <div class="add-form">
            <h2><i class="fas fa-plus-circle"></i> إضافة طريقة دفع جديدة</h2>
            <div class="form-group">
                <label>اسم البنك / طريقة الدفع</label>
                <input type="text" id="method-name" placeholder="مثال: بنك موريتانيا">
            </div>
            <div class="form-group">
                <label>رابط الشعار (URL)</label>
                <input type="text" id="method-logo" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>رقم الحساب</label>
                <input type="text" id="method-account" placeholder="مثال: 1234 5678 9012">
            </div>
            <button class="save-btn" onclick="addMethod()">
                <i class="fas fa-save"></i> حفظ طريقة الدفع
            </button>
        </div>

        <div class="methods-list" id="methods-list">
            <p style="text-align:center; color:#94a3b8;">جاري التحميل...</p>
        </div>
    </div>

    <script type="module" src="./js/payment-methods.js"></script>
</body>
</html>
