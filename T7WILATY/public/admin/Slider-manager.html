<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecondsCard</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">



</head>
<body>

<header class="admin-top-header">
    <div class="header-container">
<div class="logo">
    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="../assets/logo.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain;">
            <div style="display:flex; flex-direction:column; line-height:1.1;">
                <span style="font-size:18px; font-weight:800; color:white;">Seconds<span style="color:#f97316;">Card</span></span>
            </div>
        </div>
    </a>
</div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="Slider-manager.html" class="nav-link"><i class="fas fa-chart-line"></i> السلايدر</a></li>
                <li><a href="admin-wallet.html" class="nav-link"><i class="fas fa-wallet"></i> المحافظ</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i>الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i>المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div style="position:relative; display:inline-block; margin-left:15px;">
    <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
        <i class="fas fa-bell"></i>
        <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
    </button>
</div>

<button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
    <i class="fas fa-moon"></i>
</button>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

<div class="page-container">

    <div class="page-title">
        <i class="fas fa-images"></i> إدارة السلايدر
    </div>

    <!-- نموذج الإضافة/التعديل -->
    <div class="add-form">
        <div class="form-title">
            <i class="fas fa-plus-circle"></i>
            <span id="form-title-text">إضافة شريحة جديدة</span>
        </div>

        <input type="hidden" id="edit-id">

        <div class="form-grid">
            <div class="form-group">
                <label>العنوان الرئيسي *</label>
                <input type="text" id="slide-title" placeholder="مثال: 🎮 بطاقات ألعاب بأسرع وقت">
            </div>
            <div class="form-group">
                <label>نص الزر</label>
                <input type="text" id="slide-btn-text" placeholder="تسوق الآن" value="تسوق الآن">
            </div>
            <div class="form-group full">
                <label>العنوان الفرعي</label>
                <input type="text" id="slide-subtitle" placeholder="وصف قصير للشريحة...">
            </div>
            <div class="form-group">
                <label>رابط الزر</label>
                <input type="text" id="slide-btn-link" placeholder="#cards-grid" value="#cards-grid">
            </div>
            <div class="form-group">
                <label>الترتيب</label>
                <input type="number" id="slide-order" placeholder="0" value="0" min="0">
            </div>

            <div class="form-group full">
    <label>رابط الصورة (اختياري)</label>
    <input type="url" id="slide-image" placeholder="https://example.com/image.png" oninput="updatePreview()">
</div>

            <div class="form-group full">
                <label>الخلفية (Gradient CSS)</label>
                <input type="text" id="slide-gradient" placeholder="linear-gradient(135deg, #1a1a2e, #0f3460)"
                    oninput="updatePreview()">
                <div class="gradient-preview" id="gradient-preview"></div>
                <div class="gradient-presets" id="gradient-presets"></div>
            </div>
        </div>

        <!-- معاينة -->
        <div class="preview-section" style="margin-bottom:16px;">
            <div class="preview-label"><i class="fas fa-eye"></i> معاينة مباشرة</div>
            <div class="slider-preview" id="slide-preview">
                <h3 id="prev-title">العنوان هنا</h3>
                <p id="prev-subtitle">العنوان الفرعي هنا</p>
                <button class="prev-btn" id="prev-btn-text">تسوق الآن</button>
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="save-btn" onclick="saveSlide()">
                <i class="fas fa-save"></i> حفظ الشريحة
            </button>
            <button onclick="resetForm()" style="padding:14px 20px; background:#334155; color:#e2e8f0; border:none; border-radius:10px; cursor:pointer; font-size:0.9rem;">
                <i class="fas fa-times"></i> إلغاء
            </button>
        </div>
    </div>

    <!-- قائمة الشرائح -->
    <div class="form-title" style="margin-bottom:16px;">
        <i class="fas fa-list" style="color:#f97316;"></i> الشرائح الحالية
    </div>
    <div class="slides-list" id="slides-list">
        <div class="loading"><i class="fas fa-spinner fa-spin"></i> جاري التحميل...</div>
    </div>

</div>

<script type="module" src="./js/bell.js"></script>
<script type="module" src="./js/Slider-manager.js"></script>

</body>
</html>
