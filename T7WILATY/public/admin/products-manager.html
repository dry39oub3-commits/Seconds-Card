<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">   

    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
   <style>
    :root {
        --card-bg: #1e293b;
        --card-deep-bg: #0f172a;
        --border-color: #334155;
        --text-primary: #e2e8f0;
        --text-muted: #94a3b8;
        --input-bg: #1e293b;
        --toggle-off-bg: #334155;
        --add-sup-bg: #334155;
        --hover-bg: rgba(255,255,255,0.03);
    }

    [data-theme="light"] {
        --card-bg: #ffffff;
        --card-deep-bg: #f8fafc;
        --border-color: #e2e8f0;
        --text-primary: #1e293b;
        --text-muted: #64748b;
        --input-bg: #ffffff;
        --toggle-off-bg: #cbd5e1;
        --add-sup-bg: #e2e8f0;
        --hover-bg: rgba(0,0,0,0.03);
    }
        /* أضف داخل [data-theme="light"] */
    [data-theme="light"] .supplier-row input,
    [data-theme="light"] .sub-card-item input,
    [data-theme="light"] input[type="text"],
    [data-theme="light"] input[type="number"] {
        background: #ffffff !important;
        color: #1e293b !important;
        border-color: #e2e8f0 !important;
    }

    [data-theme="light"] .sub-card-item {
        background: #f8fafc !important;
        border: 1px solid #e2e8f0 !important;
    }

    [data-theme="light"] .product-row-item {
        background: #ffffff !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
/* حقول الأسعار */
.price-field {
    width: 100%;
    padding: 7px 10px;
    background: var(--input-bg);
    border: 1px solid var(--border-color);
    border-radius: 7px;
    color: var(--text-primary);
    font-weight: 600;
    font-size: 13px;
}
.cost-field   { color: #60a5fa !important; }
.profit-field { color: #22c55e !important; }
.rate-field   { color: #f97316 !important; }
.sell-field   { color: #f97316 !important; border-color: #f97316 !important; font-weight: 700 !important; }

[data-theme="light"] .price-field {
    background: #ffffff !important;
    border-color: #e2e8f0 !important;
}
[data-theme="light"] .sell-field {
    border-color: #f97316 !important;
}
    
    .product-row-item {
        background: var(--card-bg);
        border-radius: 12px;
        margin-bottom: 12px;
        overflow: hidden;
    }

    .product-main-info {
        display: flex;
        align-items: center;
        gap: 15px;
        padding: 15px 20px;
        cursor: pointer;
    }

    .product-main-info:hover {
        background: var(--hover-bg);
    }

    .p-img-thumb {
        width: 110px;
        height: 110px;
        object-fit: cover;
        border-radius: 15px;
        background: white;
        padding: 0;
        box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .p-identity {
        display: flex;
        align-items: center;
        gap: 12px;
        flex: 1;
    }

    .p-name {
        font-size: 16px;
        font-weight: bold;
        color: var(--text-primary);
    }

    .p-meta {
        display: flex;
        align-items: center;
        gap: 10px;
        color: var(--text-muted);
        font-size: 13px;
    }

    .delete-p-btn {
        background: #ef4444;
        color: white;
        border: none;
        padding: 7px 12px;
        border-radius: 8px;
        cursor: pointer;
    }

    .product-details-area {
        border-top: 1px solid var(--border-color);
        padding: 15px 20px;
    }

    .cards-sub-grid {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .sub-card-item {
        background: var(--card-deep-bg);
        border-radius: 10px;
        padding: 15px;
        border: 1px solid var(--border-color);
    }

    .card-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    .price-values {
        display: flex;
        gap: 10px;
        margin-bottom: 12px;
    }

    .price-mru {
        background: rgba(249,115,22,0.15);
        color: #f97316;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
    }

    .price-usd {
        background: rgba(34,197,94,0.15);
        color: #22c55e;
        padding: 4px 10px;
        border-radius: 6px;
        font-size: 13px;
    }

    .supplier-row {
        display: flex;
        gap: 8px;
        margin-bottom: 8px;
    }

    .supplier-row input {
        flex: 1;
        padding: 7px 10px;
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 6px;
        color: var(--text-primary);
        font-size: 13px;
    }

    .add-sup-btn {
        background: var(--add-sup-bg);
        color: var(--text-primary);
        border: none;
        padding: 7px 12px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-top: 5px;
        width: 100%;
    }

    .save-btn-sm {
        background: #f97316;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 13px;
        margin-top: 10px;
        width: 100%;
    }

    .toggle-switch {
        position: relative;
        display: inline-block;
        width: 40px;
        height: 22px;
    }

    .toggle-switch input {
        opacity: 0;
        width: 0;
        height: 0;
    }

    .slider {
        position: absolute;
        cursor: pointer;
        top: 0; left: 0; right: 0; bottom: 0;
        background: var(--toggle-off-bg);
        border-radius: 22px;
        transition: .3s;
    }

    .slider:before {
        position: absolute;
        content: "";
        height: 16px;
        width: 16px;
        left: 3px;
        bottom: 3px;
        background: white;
        border-radius: 50%;
        transition: .3s;
    }

    input:checked + .slider { background: #22c55e; }
    input:checked + .slider:before { transform: translateX(18px); }

    .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
    }
</style>



</head>
