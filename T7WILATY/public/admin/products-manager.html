<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .product-row-item { background:#1e293b; border-radius:12px; margin-bottom:12px; overflow:hidden; }
        .product-main-info { display:flex; align-items:center; gap:15px; padding:15px 20px; cursor:pointer; }
        .product-main-info:hover { background:rgba(255,255,255,0.03); }
        .p-img-thumb { width:50px; height:50px; object-fit:contain; background:white; border-radius:8px; padding:3px; }
        .p-identity { display:flex; align-items:center; gap:12px; flex:1; }
        .p-name { font-size:16px; font-weight:bold; }
        .p-meta { display:flex; align-items:center; gap:10px; color:#94a3b8; font-size:13px; }
        .delete-p-btn { background:#ef4444; color:white; border:none; padding:7px 12px; border-radius:8px; cursor:pointer; }
        .product-details-area { border-top:1px solid #334155; padding:15px 20px; }
.cards-sub-grid { display: flex; flex-direction: column; gap: 8px; }        .sub-card-item { background:#0f172a; border-radius:10px; padding:15px; }
        .card-header-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
        .price-values { display:flex; gap:10px; margin-bottom:12px; }
        .price-mru { background:rgba(249,115,22,0.15); color:#f97316; padding:4px 10px; border-radius:6px; font-size:13px; }
        .price-usd { background:rgba(34,197,94,0.15); color:#22c55e; padding:4px 10px; border-radius:6px; font-size:13px; }
        .supplier-row { display:flex; gap:8px; margin-bottom:8px; }
        .supplier-row input { flex:1; padding:7px 10px; background:#1e293b; border:1px solid #334155; border-radius:6px; color:#e2e8f0; font-size:13px; }
        .add-sup-btn { background:#334155; color:white; border:none; padding:7px 12px; border-radius:6px; cursor:pointer; font-size:13px; margin-top:5px; width:100%; }
        .save-btn-sm { background:#f97316; color:white; border:none; padding:8px; border-radius:6px; cursor:pointer; font-size:13px; margin-top:10px; width:100%; }
        .toggle-switch { position:relative; display:inline-block; width:40px; height:22px; }
        .toggle-switch input { opacity:0; width:0; height:0; }
        .slider { position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0; background:#334155; border-radius:22px; transition:.3s; }
        .slider:before { position:absolute; content:""; height:16px; width:16px; left:3px; bottom:3px; background:white; border-radius:50%; transition:.3s; }
        input:checked + .slider { background:#22c55e; }
        input:checked + .slider:before { transform:translateX(18px); }
        .page-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    </style>

    <script>
// تطبيق الثيم فوراً قبل رسم الصفحة
(function(){
    const t = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', t);
})();
</script>

</head>
<body>
<header class="admin-top-header">
    <div class="header-container">
<div class="logo">
    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="../assets/logo.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain;">
            <div style="display:flex; flex-direction:column; line-height:1.1;">
                <span style="font-size:18px; font-weight:800; color:white;">Seconds<span style="color:#f97316;">Card</span></span>
            </div>
        </div>
    </a>
</div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="Slider-manager.html" class="nav-link"><i class="fas fa-chart-line"></i> السلايدر</a></li>
                <li><a href="admin-wallet.html" class="nav-link"><i class="fas fa-wallet"></i> المحافظ</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i>الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i>المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div style="position:relative; display:inline-block; margin-left:15px;">
    <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
        <i class="fas fa-bell"></i>
        <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
    </button>
</div>

<button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
    <i class="fas fa-moon"></i>
</button>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

    <div class="admin-container">
        <div class="page-header">
            <h2><i class="fas fa-box-open"></i> إدارة المنتجات</h2>
            <a href="addcard.html" style="background:#f97316; color:white; padding:10px 18px; border-radius:8px; text-decoration:none; font-size:14px;">
                <i class="fas fa-plus"></i> إضافة منتج
            </a>
        </div>
        <div id="products-list-body"></div>
    </div>
<script type="module" src="./js/bell.js"></script>
    <script type="module" src="./js/products-manager.js"></script>
</body>
</html>
