<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة العملاء | SecondsCard</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">    
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-orange: #f97316;
            --dark-bg: #0f172a;
            --card-bg: #1e293b;
            --text-gray: #94a3b8;
        }

        /* تثبيت ألوان الهيدر في كلا الوضعين */
header, .admin-top-header {
    background-color: #020617 !important; /* أسود غامق جداً (Navy Black) */
    color: white !important;
    padding: 15px 24px;
    border-bottom: 1px solid #1e293b;
}

/* ضمان بقاء نصوص الهيدر بيضاء دائماً */
header h2, 
header .stats-mini, 
header #theme-toggle, 
header .nav-link {
    color: white !important;
}


/* أيقونة الثيم داخل الهيدر */
header #theme-toggle i {
    color: white !important;
}

        .users-container { padding: 20px; max-width: 1300px; margin: 0 auto; }

        .controls-row {
            display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap;
        }
        .search-box {
            flex: 1; min-width: 300px; position: relative;
        }
        .search-box input {
            width: 100%; padding: 12px 40px 12px 15px; border-radius: 8px;
            background: var(--card-bg); border: 1px solid #334155; color: white;
            box-sizing: border-box;
        }
        .search-box i { position: absolute; right: 15px; top: 15px; color: var(--text-gray); }

        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 12px; }
        .status-active { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .status-blocked { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        .sc-id-badge {
            font-family: monospace;
            font-size: 13px;
            color: #f97316;
            background: rgba(249,115,22,0.1);
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(249,115,22,0.25);
            white-space: nowrap;
        }

        .modal {
            display: none; position: fixed; z-index: 1000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
        }
        .modal-content {
            background: var(--card-bg); margin: 5% auto; padding: 25px;
            width: 90%; max-width: 500px; border-radius: 15px; border: 1px solid #334155;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-gray); }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; border-radius: 8px; background: var(--dark-bg);
            border: 1px solid #334155; color: white; box-sizing: border-box;
        }

        /* أضف في نهاية الـ CSS الخاص بصفحة users-manager */
/* حاوية الجدول المتجاوبة */
.table-container, .users-table-wrap {
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch; /* لجعل السكرول سلس جداً في الآيفون */
    margin-bottom: 20px;
    border-radius: 12px;
    border: 1px solid #334155;
    background: var(--card-bg);
}

table {
    width: 100%;
    min-width: 750px; /* ضمان عدم انضغاط الجدول حتى مع وجود 7 أعمدة */
    border-collapse: collapse;
}

th, td {
    padding: 14px 12px;
    text-align: right;
    white-space: nowrap; /* لمنع تكسير النصوص داخل الخلايا */
}

/* تحسينات الهواتف */
@media (max-width: 768px) {
    .users-container { 
        padding: 10px; 
    }
    
    .controls-row {
        flex-direction: column;
    }
    
    .search-box {
        min-width: 100%;
    }
    
    /* إخفاء بعض الأعمدة غير الأساسية في شاشات الهاتف الصغيرة جداً (أقل من 500px) */
    @media (max-width: 500px) {
        table { min-width: 600px; }
        
        /* إخفاء عمود رقم الهاتف والتاريخ في الموبايل لتوفير المساحة */
        th:nth-child(3), td:nth-child(3), /* عمود الهاتف */
        th:nth-child(6), td:nth-child(6)  /* عمود التاريخ */
        { 
            display: none; 
        }
    }
}

    </style>
    <script type="module" src="./js/admin-guard.js"></script>
</head>
<body>

<div class="users-container">
<header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 10px;">
    <h2><i class="fas fa-users" style="color: var(--primary-orange);"></i> إدارة حسابات العملاء</h2>
    <div class="stats-mini">
        <span>إجمالي العملاء: <b id="user-count">0</b></span>
    </div>
    <div class="logo">
        <a href="dashboard.html" style="text-decoration:none; color:inherit;">
            <div style="display:flex; align-items:center; gap:10px;">
                <img src="../assets/Icon.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain;">
                <div style="display:flex; flex-direction:column; line-height:1.1;">
                    <span style="font-size:18px; font-weight:800; color:white;">Seconds<span style="color:#f97316;">Card</span></span>
                </div>
            </div>
        </a>
    </div>
    <a href="staff-manager.html" style="background:rgba(249,115,22,0.15); color:#f97316; border:1px solid rgba(249,115,22,0.3); padding:8px 16px; border-radius:8px; text-decoration:none; font-size:14px; font-weight:700; display:flex; align-items:center; gap:6px;">
        <i class="fas fa-users-cog"></i> إدارة العمال
    </a>
    <button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
        <i class="fas fa-moon"></i>
    </button>
</header>

    <div class="controls-row">
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="userSearch"
                placeholder="البحث بالاسم، البريد، أو SC-ID (مثال: SC-531236)..."
                onkeyup="filterUsers()">
        </div>
        <select id="statusFilter" onchange="filterUsers()" class="form-select"
            style="width: auto; padding: 12px; border-radius: 8px; background: var(--card-bg); border: 1px solid #334155; color: white;">
            <option value="all">جميع الحالات</option>
            <option value="active">نشط</option>
            <option value="blocked">محظور</option>
        </select>
    </div>

    <div class="inventory-table">
        <table class="admin-table">
            <thead>
                <tr>
                    <th>العميل</th>
                    <th>البريد الإلكتروني</th>
                    <th>رقم الهاتف</th>
                    <th>SC-ID</th>
                    <th>الحالة</th>
                    <th>تاريخ الانضمام</th>
                    <th>إجراءات</th>
                </tr>
            </thead>
            <tbody id="users-list-body">
            </tbody>
        </table>
    </div>
</div>

<!-- Modal تعديل العميل -->
<div id="editModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-user-edit"></i> تعديل بيانات العميل</h3>
        <hr style="border: 0.5px solid #334155; margin: 15px 0;">
        <input type="hidden" id="edit-user-id">

        <div class="form-group">
            <label>الاسم الكامل:</label>
            <input type="text" id="edit-name">
        </div>
        <div class="form-group">
            <label>البريد الإلكتروني:</label>
            <input type="email" id="edit-email">
        </div>
        <div class="form-group">
            <label>كلمة مرور جديدة (اتركها فارغة لعدم التغيير):</label>
            <input type="password" id="edit-password" placeholder="******">
        </div>
        <div class="form-group">
            <label>حالة الحساب:</label>
            <select id="edit-status">
                <option value="active">نشط (مسموح له بالشراء)</option>
                <option value="blocked">محظور (ممنوع من الدخول)</option>
            </select>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button onclick="saveUserChanges()" class="save-all-btn" style="flex: 2;">حفظ التغييرات</button>
            <button onclick="closeModal()" class="btn-remove" style="flex: 1; background: #334155;">إلغاء</button>
        </div>
    </div>
</div>
<!-- زر الدردشة العائم للأدمن -->
<div id="admin-chat-float-btn" onclick="toggleAdminChat()"
     style="position:fixed; bottom:24px; left:24px; width:52px; height:52px;
            background:#f97316; color:white; border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; box-shadow:0 4px 20px rgba(249,115,22,0.4);
            z-index:99997; transition:transform 0.2s;">
    <i class="fas fa-headset"></i>
    <span id="admin-chat-badge"
          style="display:none; position:absolute; top:-4px; right:-4px;
                 background:#ef4444; color:white; border-radius:50%;
                 width:18px; height:18px; font-size:10px; font-weight:800;
                 align-items:center; justify-content:center;"></span>
</div>
<script type="module" src="./js/admin-chat.js"></script>
<script type="module" src="./js/bell.js"></script>
<script type="module" src="./js/users-manager.js"></script>
</body>
</html>
