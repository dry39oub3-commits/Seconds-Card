<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://cdn.jsdelivr.net; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self';">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الطلبات المكتملة | StoreCard</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script type="module" src="./js/admin-guard.js"></script>
</head>
<body>

<header class="admin-top-header">
    <div class="header-container">
 
        <button class="hamburger-btn" id="hamburger-btn" aria-label="القائمة">
            <span></span><span></span><span></span>
        </button>
 
        <div class="logo">
            <a href="orders.html" style="text-decoration:none; color:inherit;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="../assets/Icon.png" alt="StoreCard" style="height:40px; width:40px; object-fit:contain;">
                    <div style="display:flex; flex-direction:column; line-height:1.1;">
                        <span style="font-size:18px; font-weight:800; color:white;">
                            Store<span style="color:#f97316;">Card</span>
                        </span>
                    </div>
                </div>
            </a>
        </div>
 
        <nav class="main-nav">
            <ul class="nav-list" id="main-nav-list">
                <li data-perm="all">
                    <a href="Slider-manager.html" class="nav-link">
                        <i class="fas fa-chart-line"></i> السلايدر
                    </a>
                </li>
                <li data-perm="view_wallets">
                    <a href="admin-wallet.html" class="nav-link">
                        <i class="fas fa-wallet"></i> المحافظ
                    </a>
                </li>
                <li data-perm="all">
                    <a href="payment-methods.html" class="nav-link">
                        <i class="fas fa-credit-card"></i> الدفع
                    </a>
                </li>
                <li data-perm="view_stats">
                    <a href="dashboard.html" class="nav-link">
                        <i class="fas fa-chart-bar"></i> الإحصائيات
                    </a>
                </li>
                <li data-perm="all">
                    <a href="products-manager.html" class="nav-link">
                        <i class="fas fa-box-open"></i> المنتجات
                    </a>
                </li>
                <li data-perm="manage_stock">
                    <a href="stocks.html" class="nav-link">
                        <i class="fas fa-layer-group"></i> المخزون
                    </a>
                </li>
                <li data-perm="view_completed">
                    <a href="completed-orders.html" class="nav-link">
                        <i class="fas fa-check-double"></i> الطلبات المكتملة
                    </a>
                </li>
            </ul>
        </nav>
 
        <div style="position:relative; display:inline-block; margin-left:15px;">
            <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
                <i class="fas fa-bell"></i>
                <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </button>
        </div>
 
        <button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
            <i class="fas fa-moon"></i>
        </button>
 
        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
 
    </div>
</header>

<main class="dashboard-main-area">
    <section class="content-card">

        <!-- ملخص -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:24px;">
            <div style="background:#dcfce7;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:800;color:#16a34a;" id="summary-completed">0</div>
                <div style="color:#166534;font-size:0.85rem;margin-top:4px;">✅ مكتمل</div>
            </div>
            <div style="background:#fee2e2;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:800;color:#dc2626;" id="summary-rejected">0</div>
                <div style="color:#991b1b;font-size:0.85rem;margin-top:4px;">❌ مرفوض</div>
            </div>
            <div style="background:#fef9c3;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:1.8rem;font-weight:800;color:#ca8a04;" id="summary-refunded">0</div>
                <div style="color:#854d0e;font-size:0.85rem;margin-top:4px;">↩️ مسترد</div>
            </div>
            <div style="background:#dbeafe;border-radius:12px;padding:16px;text-align:center;">
                <div style="font-size:1.4rem;font-weight:800;color:#1d4ed8;" id="summary-revenue">0 MRU</div>
                <div style="color:#1e3a8a;font-size:0.85rem;margin-top:4px;">💰 إجمالي الإيرادات</div>
            </div>
        </div>

        <!-- فلاتر -->
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end;margin-bottom:20px;">
            <div>
                <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px;">من تاريخ</label>
                <input type="date" id="date-from" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;">
            </div>
            <div>
                <label style="font-size:12px;color:#64748b;display:block;margin-bottom:4px;">إلى تاريخ</label>
                <input type="date" id="date-to" style="padding:8px 12px;border:1px solid #ddd;border-radius:8px;">
            </div>
            <button onclick="loadCompletedOrders()"
                style="padding:8px 18px;background:#f97316;color:white;border:none;border-radius:8px;cursor:pointer;font-weight:bold;">
                <i class="fas fa-filter"></i> تطبيق
            </button>
            <button onclick="resetFilter()"
                style="padding:8px 18px;background:#e2e8f0;color:#334155;border:none;border-radius:8px;cursor:pointer;">
                <i class="fas fa-redo"></i> إعادة تعيين
            </button>
            <select id="status-filter" onchange="filterByStatus()"
    style="padding:8px 12px; border:1px solid #334155; border-radius:8px; cursor:pointer;
           background:#1e293b; color:#e2e8f0; outline:none; appearance:auto;">
    <option value="">كل الحالات</option>
    <option value="مكتمل">✅ مكتمل</option>
    <option value="ملغي">❌ مرفوض</option>
    <option value="مسترد">↩️ مسترد</option>
</select>
            <input type="text" id="orderSearch" placeholder="بحث برقم الطلب أو البريد..."
                onkeyup="filterOrders()"
                style="padding:8px 14px;border:1px solid #ddd;border-radius:8px;flex:1;min-width:200px;">
        </div>

        <!-- الجدول -->
        <div class="table-container">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th>رقم الطلب</th>
                        <th>المستخدم</th>
                        <th>صورة البطاقة</th>
                        <th>نوع البطاقة</th>
                        <th>المبلغ</th>
                        <th>الكمية</th>
                        <th>التاريخ</th>
                        <th>طريقة الدفع</th>
                        <th>الإيصال</th>
                        <th>الحالة</th>
                        <th>إجراء</th>
                    </tr>
                </thead>
                <tbody id="completed-orders-list"></tbody>
            </table>
        </div>

    </section>
</main>
<!-- زر الدردشة العائم للأدمن -->
<div id="admin-chat-float-btn" onclick="toggleAdminChat()"
     style="position:fixed; bottom:24px; left:24px; width:52px; height:52px;
            background:#f97316; color:white; border-radius:50%; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            font-size:22px; box-shadow:0 4px 20px rgba(249,115,22,0.4);
            z-index:99997; transition:transform 0.2s;">
    <i class="fas fa-headset"></i>
    <span id="admin-chat-badge"
          style="display:none; position:absolute; top:-4px; right:-4px;
                 background:#ef4444; color:white; border-radius:50%;
                 width:18px; height:18px; font-size:10px; font-weight:800;
                 align-items:center; justify-content:center;"></span>
</div>
<script type="module" src="./js/admin-chat.js"></script>
<script type="module" src="./js/header.js"></script>
<script type="module" src="./js/bell.js"></script>
<script type="module" src="./js/completed-orders.js"></script>
</body>
</html>
