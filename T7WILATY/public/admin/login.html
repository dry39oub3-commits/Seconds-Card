<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreCard | دخول الإدارة</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --orange:  #f97316;
    --orange2: #ea6c0a;
    --bg:      #020617;
    --surface: #0d1424;
    --card:    #111827;
    --border:  #1e2d42;
    --text:    #f1f5f9;
    --muted:   #475569;
    --soft:    #94a3b8;
    --danger:  #ef4444;
    --green:   #22c55e;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

.bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
        linear-gradient(rgba(249,115,22,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(249,115,22,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    animation: gridDrift 20s linear infinite;
}
@keyframes gridDrift { from { background-position: 0 0; } to { background-position: 48px 48px; } }

.bg-glow-1 {
    position: fixed; width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(249,115,22,0.12) 0%, transparent 70%);
    top: -200px; right: -150px; z-index: 0;
    animation: pulse1 8s ease-in-out infinite;
}
.bg-glow-2 {
    position: fixed; width: 400px; height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%);
    bottom: -100px; left: -100px; z-index: 0;
    animation: pulse2 10s ease-in-out infinite;
}
@keyframes pulse1 { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.15) translate(30px,20px)} }
@keyframes pulse2 { 0%,100%{transform:scale(1) translate(0,0)} 50%{transform:scale(1.2) translate(-20px,-30px)} }

.login-wrap {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    padding: 20px;
    animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes cardIn {
    from { opacity:0; transform:translateY(40px) scale(0.95); }
    to   { opacity:1; transform:translateY(0)    scale(1); }
}

.login-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px 36px 36px;
    box-shadow:
        0 0 0 1px rgba(249,115,22,0.08),
        0 24px 80px rgba(0,0,0,0.6),
        inset 0 1px 0 rgba(255,255,255,0.05);
}

.logo-area {
    display: flex; flex-direction: column; align-items: center;
    margin-bottom: 32px; gap: 10px;
}
.logo-icon {
    width: 62px; height: 62px; border-radius: 18px;
    background: linear-gradient(135deg, rgba(249,115,22,0.2), rgba(249,115,22,0.05));
    border: 1px solid rgba(249,115,22,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 30px rgba(249,115,22,0.2);
    animation: iconPop 0.8s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
}
@keyframes iconPop { from{transform:scale(0) rotate(-20deg)} to{transform:scale(1) rotate(0)} }

.logo-name {
    font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
    color: var(--text);
}
.logo-name span { color: var(--orange); }

.logo-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600;
    color: var(--orange);
    background: rgba(249,115,22,0.1);
    border: 1px solid rgba(249,115,22,0.25);
    padding: 3px 12px; border-radius: 20px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.login-title {
    text-align: center; margin-bottom: 28px;
}
.login-title h1 {
    font-size: 20px; font-weight: 800; color: var(--text);
    margin-bottom: 6px;
}
.login-title p { font-size: 13px; color: var(--soft); }

.field { margin-bottom: 18px; }
.field label {
    display: flex; align-items: center; gap: 6px;
    font-size: 12px; font-weight: 700;
    color: var(--soft); letter-spacing: 0.5px;
    text-transform: uppercase; margin-bottom: 8px;
}
.field label i { color: var(--orange); font-size: 11px; }

.input-wrap { position: relative; }
.input-wrap input {
    width: 100%; padding: 13px 16px 13px 44px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    font-family: 'Tajawal', sans-serif;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    direction: ltr;
}
.input-wrap input::placeholder { color: var(--muted); }
.input-wrap input:focus {
    border-color: var(--orange);
    background: #0f172a;
    box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
}
.input-wrap .input-icon {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted); font-size: 15px;
    transition: color 0.2s; pointer-events: none;
}
.input-wrap input:focus ~ .input-icon { color: var(--orange); }

.toggle-pass {
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%);
    background: none; border: none;
    color: var(--muted); font-size: 15px;
    cursor: pointer; padding: 4px;
    transition: color 0.2s;
}
.toggle-pass:hover { color: var(--orange); }

.error-msg {
    display: none;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 16px;
    align-items: center; gap: 8px;
}
.error-msg.show { display: flex; animation: shake 0.4s ease; }
@keyframes shake {
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
}

.login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--orange), var(--orange2));
    color: white; border: none; border-radius: 12px;
    font-size: 15px; font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer; margin-top: 6px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    position: relative; overflow: hidden;
}
.login-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
    opacity: 0; transition: opacity 0.2s;
}
.login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,115,22,0.45); }
.login-btn:hover::before { opacity: 1; }
.login-btn:active { transform: translateY(0); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0 16px;
}
.divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
}
.divider span {
    font-size: 11px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    letter-spacing: 1px;
}

.security-note {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    font-size: 11px; color: var(--muted);
}
.security-note i { color: var(--green); font-size: 10px; }

.field, .login-btn { animation: fadeUp 0.5s ease both; }
.field:nth-child(1) { animation-delay: 0.3s; }
.field:nth-child(2) { animation-delay: 0.4s; }
.login-btn         { animation-delay: 0.5s; }
@keyframes fadeUp {
    from { opacity:0; transform:translateY(16px); }
    to   { opacity:1; transform:translateY(0); }
}

@media (max-width: 480px) {
    .login-card { padding: 32px 24px 28px; border-radius: 20px; }
    .login-wrap { padding: 16px; }
}
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="login-wrap">
    <div class="login-card">

        <div class="logo-area">
            <div class="logo-icon">
                <img src="../assets/logo.png" style="width:36px;height:36px;object-fit:contain;" onerror="this.parentElement.innerHTML='⚡'">
            </div>
            <div class="logo-name">Store<span>Card</span></div>
            <div class="logo-badge">ADMIN PANEL</div>
        </div>

        <div class="login-title">
            <h1>مرحباً بك</h1>
            <p>أدخل بيانات المسؤول للوصول إلى لوحة التحكم</p>
        </div>

        <div class="error-msg" id="error-msg">
            <i class="fas fa-exclamation-circle"></i>
            <span id="error-text">البريد أو كلمة المرور غير صحيحة</span>
        </div>

        <div class="field">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <div class="input-wrap">
                <input type="email" id="email" placeholder="admin@Storecard.com"
                    autocomplete="email" spellcheck="false">
                <i class="input-icon fas fa-at"></i>
            </div>
        </div>

        <div class="field">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="••••••••••••"
                    autocomplete="current-password">
                <i class="input-icon fas fa-lock"></i>
                <button type="button" class="toggle-pass" id="toggle-pass" tabindex="-1">
                    <i class="fas fa-eye" id="eye-icon"></i>
                </button>
            </div>
        </div>

        <button class="login-btn" id="login-btn" onclick="handleLogin()">
            <span class="spinner" id="spinner"></span>
            <i class="fas fa-arrow-left" id="btn-icon"></i>
            <span id="btn-text">دخول لوحة التحكم</span>
        </button>

        <div class="divider"><span>SECURED</span></div>

        <div class="security-note">
            <i class="fas fa-shield-alt"></i>
            <span>الوصول مقيد للمسؤولين المعتمدين فقط</span>
        </div>

    </div>
</div>

<script type="module">
import { supabase } from '../js/supabase-config.js';

// ── عرض/إخفاء كلمة المرور ──
document.getElementById('toggle-pass').addEventListener('click', () => {
    const input    = document.getElementById('password');
    const icon     = document.getElementById('eye-icon');
    const isPass   = input.type === 'password';
    input.type     = isPass ? 'text' : 'password';
    icon.className = isPass ? 'fas fa-eye-slash' : 'fas fa-eye';
});

// ── إرسال بـ Enter ──
document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleLogin();
});
document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
});

// ── إخفاء الخطأ عند الكتابة ──
['email', 'password'].forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        document.getElementById('error-msg').classList.remove('show');
    });
});

// ── تسجيل الدخول ──
window.handleLogin = async () => {
    const email   = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn     = document.getElementById('login-btn');
    const spinner = document.getElementById('spinner');
    const btnIcon = document.getElementById('btn-icon');
    const btnText = document.getElementById('btn-text');
    const errMsg  = document.getElementById('error-msg');
    const errText = document.getElementById('error-text');

    if (!email || !password) {
        errText.textContent = 'يرجى إدخال البريد وكلمة المرور';
        errMsg.classList.add('show');
        return;
    }

    btn.disabled          = true;
    spinner.style.display = 'block';
    btnIcon.style.display = 'none';
    btnText.textContent   = 'جاري التحقق...';
    errMsg.classList.remove('show');

    try {
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) throw error;

        // ✅ التحقق من is_admin أو is_staff في قاعدة البيانات
        const { data: userData } = await supabase
            .from('users')
            .select('is_admin, is_staff')
            .eq('id', data.user.id)
            .single();

        if (!userData?.is_admin && !userData?.is_staff) {
            await supabase.auth.signOut();
            throw new Error('ليس لديك صلاحية الوصول إلى لوحة التحكم');
        }

        // ✅ نجاح — تأثير بصري قبل التحويل
        btnText.textContent   = '✅ جاري الدخول...';
        spinner.style.display = 'none';
        btnIcon.style.display = 'block';
        btnIcon.className     = 'fas fa-check';
        btn.style.background  = 'linear-gradient(135deg,#22c55e,#16a34a)';

        setTimeout(() => {
                window.location.href = 'orders.html';
            }, 800);

    } catch (err) {
        errText.textContent = err.message === 'Invalid login credentials'
            ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة'
            : err.message;
        errMsg.classList.add('show');

        btn.disabled          = false;
        spinner.style.display = 'none';
        btnIcon.style.display = 'block';
        btnIcon.className     = 'fas fa-arrow-left';
        btnText.textContent   = 'دخول لوحة التحكم';
    }
};

// ── إذا كان مسجل دخوله بالفعل → تحويل مباشر ──
(async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
        const { data: userData } = await supabase
            .from('users')
            .select('is_admin, is_staff')
            .eq('id', session.user.id)
            .single();

        // ✅ يقبل is_admin أو is_staff
        if (userData?.is_admin === true || userData?.is_staff === true) {
            window.location.href = 'dashboard.html';
        }
    }
})();
</script>
</body>
</html>
