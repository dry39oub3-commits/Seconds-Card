<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoreCard | غير مصرح</title>
    <link rel="icon" type="image/png" href="../assets/Icon.png">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
    --orange: #f97316;
    --bg:     #020617;
    --card:   #0f172a;
    --border: #1e2d42;
    --text:   #f1f5f9;
    --muted:  #64748b;
    --red:    #ef4444;
}

body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Tajawal', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
}

/* خلفية شبكة */
.bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
        linear-gradient(rgba(239,68,68,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(239,68,68,0.03) 1px, transparent 1px);
    background-size: 48px 48px;
}

/* توهج أحمر */
.bg-glow {
    position: fixed;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(239,68,68,0.08) 0%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
    animation: pulse 4s ease-in-out infinite;
}
@keyframes pulse {
    0%,100% { transform: translate(-50%,-50%) scale(1); opacity:0.6; }
    50%      { transform: translate(-50%,-50%) scale(1.2); opacity:1; }
}

/* الكارد */
.error-wrap {
    position: relative; z-index: 1;
    text-align: center;
    padding: 20px;
    animation: fadeIn 0.5s ease both;
}
@keyframes fadeIn {
    from { opacity:0; transform: translateY(30px); }
    to   { opacity:1; transform: translateY(0); }
}

/* الرقم الكبير */
.error-code {
    font-family: 'IBM Plex Mono', monospace;
    font-size: clamp(80px, 15vw, 140px);
    font-weight: 600;
    line-height: 1;
    color: transparent;
    background: linear-gradient(135deg, var(--red), #f97316);
    -webkit-background-clip: text;
    background-clip: text;
    margin-bottom: 8px;
    animation: glitch 3s infinite;
    position: relative;
}

/* تأثير glitch خفيف */
@keyframes glitch {
    0%,90%,100% { text-shadow: none; }
    92% { text-shadow: -3px 0 #f97316, 3px 0 #3b82f6; }
    94% { text-shadow: 3px 0 #f97316, -3px 0 #3b82f6; }
    96% { text-shadow: none; }
}

.lock-icon {
    font-size: 52px;
    color: var(--red);
    margin-bottom: 20px;
    display: block;
    animation: shake 4s ease-in-out infinite;
}
@keyframes shake {
    0%,85%,100% { transform: rotate(0deg); }
    88% { transform: rotate(-8deg); }
    92% { transform: rotate(8deg); }
    96% { transform: rotate(-4deg); }
}

.error-title {
    font-size: 22px; font-weight: 900;
    color: var(--text);
    margin-bottom: 10px;
}

.error-msg {
    font-size: 14px; color: var(--muted);
    max-width: 340px; margin: 0 auto 32px;
    line-height: 1.8;
}

/* الأزرار */
.btn-group {
    display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
}

.btn-back {
    padding: 12px 28px;
    background: linear-gradient(135deg, var(--orange), #ea6c0a);
    color: white; border: none; border-radius: 12px;
    font-size: 14px; font-weight: 800;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    box-shadow: 0 4px 20px rgba(249,115,22,0.35);
    transition: transform 0.15s, box-shadow 0.15s;
}
.btn-back:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(249,115,22,0.45); }

.btn-home {
    padding: 12px 28px;
    background: transparent;
    color: var(--muted); border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 14px; font-weight: 700;
    font-family: 'Tajawal', sans-serif;
    cursor: pointer; text-decoration: none;
    display: inline-flex; align-items: center; gap: 8px;
    transition: border-color 0.2s, color 0.2s;
}
.btn-home:hover { border-color: var(--orange); color: var(--orange); }

/* شريط تحت الكارد */
.perm-hint {
    margin-top: 36px;
    background: rgba(239,68,68,0.06);
    border: 1px solid rgba(239,68,68,0.15);
    border-radius: 12px;
    padding: 14px 20px;
    font-size: 13px;
    color: #fca5a5;
    max-width: 360px;
    margin-left: auto; margin-right: auto;
    display: flex; align-items: center; gap: 10px;
}
.perm-hint i { font-size: 16px; flex-shrink: 0; }
</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<div class="error-wrap">

    <i class="fas fa-lock lock-icon"></i>

    <div class="error-code">403</div>

    <div class="error-title">غير مصرح بالوصول</div>

    <p class="error-msg">
        ليس لديك الصلاحية للوصول إلى هذه الصفحة.<br>
        تواصل مع المسؤول لطلب الصلاحية المطلوبة.
    </p>

    <div class="btn-group">
        <a href="javascript:history.back()" class="btn-back">
            <i class="fas fa-arrow-right"></i> العودة للخلف
        </a>
        <a href="orders.html" class="btn-home">
            <i class="fas fa-home"></i> الرئيسية
        </a>
    </div>

    <div class="perm-hint">
        <i class="fas fa-info-circle"></i>
        <span>إذا كنت تعتقد أن هذا خطأ، تواصل مع الأدمن لتحديث صلاحياتك.</span>
    </div>

</div>

</body>
</html>
