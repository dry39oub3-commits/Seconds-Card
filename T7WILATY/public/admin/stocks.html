<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card | المخزون</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <script>
        (function(){
            const t = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', t);
        })();
    </script>

    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-card: #0f1628;
            --bg-elevated: #151d35;
            --bg-input: #0d1220;
            --accent: #f97316;
            --accent-glow: rgba(249,115,22,0.15);
            --accent-2: #6366f1;
            --accent-2-glow: rgba(99,102,241,0.15);
            --success: #10b981;
            --danger: #ef4444;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255,255,255,0.06);
            --border-hover: rgba(249,115,22,0.3);
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
            --radius: 14px;
            --radius-sm: 8px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 20% -10%, rgba(249,115,22,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 110%, rgba(99,102,241,0.06) 0%, transparent 60%);
        }

        /* ===== STOCK CONTAINER ===== */
        .stock-wrapper {
            max-width: 1300px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 36px;
            animation: fadeDown 0.5s ease;
        }

        .page-header-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-glow);
            border: 1px solid rgba(249,115,22,0.3);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .page-header span {
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            margin-top: 2px;
        }

        /* ===== GRID LAYOUT ===== */
        .stock-grid {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 24px;
            align-items: start;
        }

        @media (max-width: 1024px) {
            .stock-grid { grid-template-columns: 1fr; }
        }

        /* ===== CARDS ===== */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeUp 0.5s ease both;
            transition: border-color 0.3s;
        }

        .card:hover { border-color: rgba(249,115,22,0.15); }

        .card-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-header-icon {
            width: 36px;
            height: 36px;
            background: var(--accent-glow);
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 15px;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .card-body { padding: 24px; }

        /* ===== FORM ELEMENTS ===== */
        .form-group { margin-bottom: 18px; }

        .form-label {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .form-label .step-badge {
            width: 20px;
            height: 20px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            font-size: 10px;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .form-select,
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 11px 14px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
            appearance: none;
            -webkit-appearance: none;
        }

        .form-select:focus,
        .form-input:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-select option { background: var(--bg-elevated); }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.7;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: '\f107';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
            font-size: 13px;
        }

        /* ===== SUPPLIER SECTION ===== */
        .supplier-card {
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 16px;
            margin-bottom: 18px;
        }

        .buy-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 12px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .buy-btn:hover { opacity: 0.9; transform: translateY(-1px); }

        /* ===== SUBMIT BUTTON ===== */
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, var(--accent), #ea580c);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-family: 'Tajawal', sans-serif;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s, transform 0.1s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(249,115,22,0.3);
            margin-top: 6px;
        }

        .submit-btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
            box-shadow: 0 6px 28px rgba(249,115,22,0.4);
        }

        .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        /* ===== STATS STRIP ===== */
        .stats-strip {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
            margin-bottom: 24px;
            animation: fadeUp 0.5s 0.1s ease both;
        }

        @media (max-width: 900px) {
            .stats-strip { grid-template-columns: repeat(2, 1fr); }
        }

        .stat-tile {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 16px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: border-color 0.2s, transform 0.2s;
        }

        .stat-tile:hover { border-color: var(--border-hover); transform: translateY(-2px); }

        .stat-tile-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .stat-tile-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .stat-tile-value {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1.2;
        }

        /* ===== TABLE ===== */
        .table-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            animation: fadeUp 0.5s 0.15s ease both;
        }

        .table-header {
            padding: 18px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .table-header h3 {
            font-size: 15px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
        }

        .table-header h3 i { color: var(--accent); }

        .inventory-table {
            width: 100%;
            border-collapse: collapse;
        }

        .inventory-table thead th {
            padding: 12px 16px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            text-align: right;
        }

        .inventory-table tbody tr {
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .inventory-table tbody tr:hover { background: rgba(255,255,255,0.02); }
        .inventory-table tbody tr:last-child { border-bottom: none; }

        .inventory-table tbody td {
            padding: 14px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            vertical-align: middle;
        }

        .product-name {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 14px;
        }

        .price-badge {
            background: var(--accent-glow);
            color: var(--accent);
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid rgba(249,115,22,0.2);
        }

        .supplier-chip {
            background: rgba(16,185,129,0.1);
            color: #10b981;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid rgba(16,185,129,0.2);
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .order-chip {
            background: var(--accent-2-glow);
            color: var(--accent-2);
            padding: 3px 10px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            font-family: monospace;
            border: 1px solid rgba(99,102,241,0.2);
        }

        .stock-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .stock-badge.good {
            background: rgba(16,185,129,0.1);
            color: #10b981;
            border: 1px solid rgba(16,185,129,0.2);
        }

        .stock-badge.empty {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.2);
        }

        .btn-view {
            padding: 6px 14px;
            background: var(--accent-2-glow);
            color: var(--accent-2);
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 7px;
            font-family: 'Tajawal', sans-serif;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .btn-view:hover {
            background: rgba(99,102,241,0.25);
            transform: translateY(-1px);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(6px);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal-box {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 0;
            width: 90%;
            max-width: 580px;
            max-height: 82vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 24px 80px rgba(0,0,0,0.6);
            animation: scaleIn 0.25s ease;
        }

        .modal-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .modal-head h3 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            background: rgba(255,255,255,0.06);
            border: none;
            border-radius: 8px;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.2s, color 0.2s;
        }

        .modal-close:hover { background: rgba(239,68,68,0.15); color: #ef4444; }

        .modal-actions {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .btn-delete-all {
            width: 100%;
            padding: 10px;
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            border: 1px solid rgba(239,68,68,0.25);
            border-radius: var(--radius-sm);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: background 0.2s;
        }

        .btn-delete-all:hover { background: rgba(239,68,68,0.2); }

        .modal-body {
            padding: 16px 24px;
            overflow-y: auto;
            flex: 1;
        }

        .code-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            margin-bottom: 8px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: 10px;
            transition: border-color 0.2s;
        }

        .code-item:hover { border-color: rgba(99,102,241,0.2); }

        .code-item-content { flex: 1; min-width: 0; }

        .code-text {
            font-family: 'Courier New', monospace;
            font-size: 13px;
            color: var(--text-primary);
            word-break: break-all;
            display: block;
        }

        .code-order {
            font-size: 11px;
            color: var(--accent-2);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .btn-del-single {
            width: 28px;
            height: 28px;
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            border-radius: 7px;
            color: #ef4444;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            flex-shrink: 0;
            transition: background 0.2s;
        }

        .btn-del-single:hover { background: rgba(239,68,68,0.25); }

        /* ===== ANIMATIONS ===== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
        }

        .empty-state i { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }
        .empty-state p { font-size: 14px; }

        /* ===== FILTER BAR ===== */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--bg-elevated);
            flex-wrap: wrap;
        }

        .filter-bar label {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-bar select,
        .filter-bar input[type="date"] {
            padding: 7px 12px;
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 13px;
        }

        .filter-bar select:focus,
        .filter-bar input[type="date"]:focus {
            outline: none;
            border-color: var(--accent);
        }
    </style>
</head>
<body>

<header class="admin-top-header">
    <div class="header-container">
        <div class="logo">
            <a href="dashboard.html" style="text-decoration:none; color:inherit;">
                <div style="display:flex; align-items:center; gap:10px;">
                    <img src="../assets/logo.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain;">
                    <div style="display:flex; flex-direction:column; line-height:1.1;">
                        <span style="font-size:18px; font-weight:800; color:white;">Seconds<span style="color:#f97316;">Card</span></span>
                    </div>
                </div>
            </a>
        </div>

        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="Slider-manager.html" class="nav-link"><i class="fas fa-chart-line"></i> السلايدر</a></li>
                <li><a href="admin-wallet.html" class="nav-link"><i class="fas fa-wallet"></i> المحافظ</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i> الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i> المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link active"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div style="position:relative; display:inline-block; margin-left:15px;">
            <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
                <i class="fas fa-bell"></i>
                <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
            </button>
        </div>

        <button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
            <i class="fas fa-moon"></i>
        </button>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

<div class="stock-wrapper">

    <!-- PAGE HEADER -->
    <div class="page-header">
        <div class="page-header-icon"><i class="fas fa-warehouse"></i></div>
        <div>
            <h1>إدارة المخزون</h1>
            <span>تعبئة الأكواد ومتابعة حالة المخزون</span>
        </div>
    </div>

    <!-- STATS STRIP -->
    <div class="stats-strip">
        <div class="stat-tile">
            <div class="stat-tile-icon" style="background:rgba(249,115,22,0.12); color:#f97316;">
                <i class="fas fa-layer-group"></i>
            </div>
            <div>
                <div class="stat-tile-label">مضاف</div>
                <div class="stat-tile-value" id="total-added-cards">0</div>
            </div>
        </div>
        <div class="stat-tile">
            <div class="stat-tile-icon" style="background:rgba(16,185,129,0.12); color:#10b981;">
                <i class="fas fa-dollar-sign"></i>
            </div>
            <div>
                <div class="stat-tile-label">التكلفة</div>
                <div class="stat-tile-value" id="total-cost">$0</div>
            </div>
        </div>
        <div class="stat-tile">
            <div class="stat-tile-icon" style="background:rgba(33,150,243,0.12); color:#2196f3;">
                <i class="fas fa-history"></i>
            </div>
            <div>
                <div class="stat-tile-label">مباع 24س</div>
                <div class="stat-tile-value" id="used-24h">0</div>
            </div>
        </div>
        <div class="stat-tile" style="border-color:rgba(249,115,22,0.2);">
            <div class="stat-tile-icon" style="background:var(--accent-glow); color:var(--accent);">
                <i class="fas fa-boxes"></i>
            </div>
            <div>
                <div class="stat-tile-label">إجمالي</div>
                <div class="stat-tile-value" id="total-inventory">0</div>
            </div>
        </div>
    </div>

    <!-- MAIN GRID -->
    <div class="stock-grid">

        <!-- LEFT: FORM -->
        <div class="card" style="animation-delay:0.05s;">
            <div class="card-header">
                <div class="card-header-icon"><i class="fas fa-plus-circle"></i></div>
                <h2>تعبئة الأكواد</h2>
            </div>
            <div class="card-body">

                <!-- 1. المنتج -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step-badge">1</span> المنتج
                    </label>
                    <div class="select-wrapper">
                        <select id="productSelect" class="form-select" onchange="updatePriceOptions()">
                            <option value="">-- اختر المنتج --</option>
                        </select>
                    </div>
                </div>

                <!-- 2. الفئة السعرية -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step-badge">2</span> الفئة السعرية
                    </label>
                    <div class="select-wrapper">
                        <select id="priceSelect" class="form-select">
                            <option value="">-- اختر الفئة --</option>
                        </select>
                    </div>
                </div>

                <!-- 3. المورد -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step-badge">3</span> المورد
                    </label>
                    <div class="supplier-card">
                        <div class="select-wrapper">
                            <select id="supplierSelect" class="form-select" onchange="toggleBuyButton()" style="background:transparent; border:none; padding:4px 30px 4px 4px;">
                                <option value="">-- اختر المورد --</option>
                            </select>
                        </div>

                        <div class="form-group" style="margin-top:12px; margin-bottom:0;">
                            <label class="form-label" style="margin-bottom:6px;">
                                <i class="fas fa-hashtag" style="color:var(--accent-2);"></i> Order ID
                            </label>
                            <input type="text" id="supplierOrderId" class="form-input" placeholder="رقم الطلب من المورد...">
                        </div>

                        <div id="buyButtonContainer" style="display:none;">
                            <button class="buy-btn" onclick="openSupplierLink()">
                                <i class="fas fa-external-link-alt"></i> شراء الأكواد الآن
                            </button>
                        </div>
                    </div>
                </div>

                <!-- 4. الأكواد -->
                <div class="form-group">
                    <label class="form-label">
                        <span class="step-badge">4</span> الأكواد
                        <span style="text-transform:none; font-weight:400; color:var(--text-muted);">(كود في كل سطر)</span>
                    </label>
                    <textarea id="codesInput" class="form-textarea" placeholder="أدخل الأكواد هنا...&#10;كود1&#10;كود2&#10;كود3"></textarea>
                </div>

                <button id="addCodesBtn" class="submit-btn">
                    <i class="fas fa-upload"></i> تحديث المخزون
                </button>

            </div>
        </div>

        <!-- RIGHT: TABLE -->
        <div>
            <!-- Filter Bar -->
            <div class="table-card" style="margin-bottom:16px; overflow:visible;">
                <div class="filter-bar">
                    <label><i class="fas fa-history"></i> حركة البطاقات:</label>
                    <select id="movement-period" onchange="fetchMovementStats()">
                        <option value="24h">آخر 24 ساعة</option>
                        <option value="7d">آخر 7 أيام</option>
                        <option value="custom">تاريخ محدد</option>
                    </select>
                    <div id="custom-date-group" style="display:none; display:flex; align-items:center; gap:8px;">
                        <label><i class="fas fa-calendar-day"></i></label>
                        <input type="date" id="history-date-filter" onchange="fetchMovementStats()">
                    </div>
                </div>
            </div>


            <!-- فلتر المخزون -->
<div style="padding:14px 24px; border-bottom:1px solid var(--border); background:var(--bg-elevated); display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <label style="font-size:12px; font-weight:600; color:var(--text-muted); display:flex; align-items:center; gap:6px;">
        <i class="fas fa-filter" style="color:var(--accent);"></i> تصفية:
    </label>
    <div class="select-wrapper" style="min-width:180px;">
        <select id="filterProduct" class="form-select" onchange="filterInventoryTable()" style="padding:7px 30px 7px 12px; font-size:13px;">
            <option value="">-- كل المنتجات --</option>
        </select>
    </div>
    <div class="select-wrapper" id="filterPriceWrapper" style="min-width:160px; display:none;">
        <select id="filterPrice" class="form-select" onchange="filterInventoryTable()" style="padding:7px 30px 7px 12px; font-size:13px;">
            <option value="">-- كل الفئات --</option>
        </select>
    </div>
</div>


            <!-- Inventory Table -->
            <div class="table-card">
                <div class="table-header">
                    <h3><i class="fas fa-table"></i> حالة المخزون</h3>
                </div>
                <div style="overflow-x:auto;">
                    <table class="inventory-table">
                        <thead>
                            <tr>
                                <th>المنتج</th>
                                <th>الفئة</th>
                                <th>المورد</th>
                                <th>Order ID</th>
                                <th>الأكواد</th>
                                <th>آخر تحديث</th>
                                <th>إجراء</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-list-body"></tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- MODAL -->
<div id="codesModal" class="modal-overlay">
    <div class="modal-box">
        <div class="modal-head">
            <h3 id="modalTitle"></h3>
            <button class="modal-close" onclick="closeCodesModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-actions">
            <button class="btn-delete-all" onclick="deleteAllCodes()">
                <i class="fas fa-trash-alt"></i> حذف جميع الأكواد
            </button>
        </div>
        <div class="modal-body" id="codesListContainer"></div>
    </div>
</div>

<script type="module" src="./js/bell.js"></script>
<script type="module" src="./js/stocks.js"></script>
</body>
</html>
