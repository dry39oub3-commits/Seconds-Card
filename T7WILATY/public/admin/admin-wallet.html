<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card | AdminPanel</title>
    <link rel="icon" type="image/png" href="../assets/logo.png">
    <link rel="stylesheet" href="./css/dashboard-main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="./css/admin-wallet.css">
</head>
<body>

<header class="admin-top-header">
    <div class="header-container">
<div class="logo">
    <a href="dashboard.html" style="text-decoration:none; color:inherit;">
        <div style="display:flex; align-items:center; gap:10px;">
            <img src="../assets/logo.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain;">
            <div style="display:flex; flex-direction:column; line-height:1.1;">
                <span style="font-size:18px; font-weight:800; color:white;">Seconds<span style="color:#f97316;">Card</span></span>
            </div>
        </div>
    </a>
</div>
        
        <nav class="main-nav">
            <ul class="nav-list">
                <li><a href="Slider-manager.html" class="nav-link"><i class="fas fa-chart-line"></i> السلايدر</a></li>
                <li><a href="admin-wallet.html" class="nav-link"><i class="fas fa-wallet"></i> المحافظ</a></li>
                <li><a href="payment-methods.html" class="nav-link"><i class="fas fa-credit-card"></i>الدفع</a></li>
                <li><a href="orders.html" class="nav-link"><i class="fas fa-shopping-cart"></i> الطلبات</a></li>
                <li><a href="products-manager.html" class="nav-link"><i class="fas fa-box-open"></i>المنتجات</a></li>
                <li><a href="stocks.html" class="nav-link"><i class="fas fa-layer-group"></i> المخزون</a></li>
                <li><a href="completed-orders.html" class="nav-link"><i class="fas fa-check-double"></i> الطلبات المكتملة</a></li>
            </ul>
        </nav>

        <div style="position:relative; display:inline-block; margin-left:15px;">
    <button id="bell-btn" style="background:none; border:none; color:white; font-size:22px; cursor:pointer; position:relative;">
        <i class="fas fa-bell"></i>
        <span id="orders-badge" style="display:none; position:absolute; top:-5px; right:-5px; background:#ef4444; color:white; border-radius:50%; width:18px; height:18px; font-size:11px; display:flex; align-items:center; justify-content:center; font-weight:bold;">0</span>
    </button>
</div>

<button id="theme-toggle" style="background:none; border:none; color:white; font-size:20px; cursor:pointer; padding:6px;">
    <i class="fas fa-moon"></i>
</button>

        <div class="user-actions">
            <button class="logout-btn" id="logoutBtn">
                <i class="fas fa-sign-out-alt"></i> <span>خروج</span>
            </button>
        </div>
    </div>
</header>

<div class="admin-container">

    <h2 style="margin-bottom:20px;"><i class="fas fa-wallet"></i> إدارة المحافظ</h2>

    <!-- إحصائيات -->
    <div class="stats-grid">
        <div class="stat-card">
            <div class="stat-value" id="stat-pending">0</div>
            <div class="stat-label">طلبات قيد المراجعة</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-total-charge" style="color:#22c55e;">0</div>
            <div class="stat-label">إجمالي الشحن (MRU)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-total-withdraw" style="color:#3b82f6;">0</div>
            <div class="stat-label">إجمالي السحب (MRU)</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-users">0</div>
            <div class="stat-label">مستخدمين لديهم رصيد</div>
        </div>
    </div>

    <!-- تبويبات -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('pending')">
            <i class="fas fa-clock"></i> قيد المراجعة
            <span id="pending-count" style="background:#eab308; color:white; border-radius:50%; padding:1px 7px; font-size:11px; margin-right:5px;">0</span>
        </button>
        <button class="tab-btn" onclick="switchTab('charge')">
            <i class="fas fa-arrow-up"></i> طلبات الشحن
        </button>
        <button class="tab-btn" onclick="switchTab('withdraw')">
            <i class="fas fa-arrow-down"></i> طلبات السحب
        </button>
        <button class="tab-btn" onclick="switchTab('users')">
            <i class="fas fa-users"></i> أرصدة المستخدمين
        </button>
        <button class="tab-btn" onclick="switchTab('methods')">
            <i class="fas fa-credit-card"></i> بوابات الدفع
        </button>
    </div>

    <!-- فلتر -->
    <div class="filter-bar">
        <input type="text" id="search-input" placeholder="بحث..." oninput="applyFilter()">
        <select id="status-filter" onchange="applyFilter()">
            <option value="">كل الحالات</option>
            <option value="قيد المراجعة">قيد المراجعة</option>
            <option value="مكتمل">مكتمل</option>
            <option value="مرفوض">مرفوض</option>
        </select>
    </div>

    <!-- قيد المراجعة -->
    <div class="tab-content active" id="tab-pending">
        <div id="pending-list"></div>
    </div>

    <!-- طلبات الشحن -->
    <div class="tab-content" id="tab-charge">
        <div id="charge-list"></div>
    </div>

    <!-- طلبات السحب -->
    <div class="tab-content" id="tab-withdraw">
        <div id="withdraw-list"></div>
    </div>

    <div class="tab-content" id="tab-methods">
    <div id="methods-list"></div>
</div>

    <!-- أرصدة المستخدمين -->
    <div class="tab-content" id="tab-users">
        <div id="users-list"></div>
    </div>
</div>

<!-- Modal تعديل الرصيد يدوياً -->
<div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
        <h3 style="color:#f97316; text-align:center; margin-bottom:16px;">تعديل رصيد المستخدم</h3>
        <p style="color:#94a3b8; font-size:13px; margin-bottom:12px;">المستخدم: <strong id="edit-user-id" style="color:#e2e8f0;"></strong></p>
        <label style="font-size:13px; color:#94a3b8; display:block; margin-bottom:6px;">الرصيد الجديد (MRU)</label>
        <input type="number" id="edit-balance-input" placeholder="0"
    style="width:100%; padding:10px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0; margin-bottom:14px; box-sizing:border-box; font-size:14px;">
        <label style="font-size:13px; color:#94a3b8; display:block; margin-bottom:6px;">ملاحظة (اختياري)</label>
        <input type="text" id="edit-note-input" placeholder="سبب التعديل..."
    style="width:100%; padding:10px; background:#0f172a; border:1px solid #334155; border-radius:8px; color:#e2e8f0; margin-bottom:14px; box-sizing:border-box; font-size:14px;">
        <button onclick="saveBalance()" style="width:100%; padding:12px; background:#f97316; color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold; margin-bottom:8px;">
            <i class="fas fa-save"></i> حفظ
        </button>
        <button onclick="closeEditModal()" style="width:100%; padding:10px; background:none; border:1px solid #334155; border-radius:8px; color:#94a3b8; cursor:pointer;">
            إلغاء
        </button>
    </div>
</div>

<!-- Modal عرض الإيصال -->
<div class="modal-overlay" id="receipt-modal" onclick="this.classList.remove('active')">
    <img id="receipt-full-img" style="max-width:90%; max-height:90%; border-radius:12px;">
</div>

<script type="module" src="./js/admin-wallet.js"></script>

</body>
</html>
