<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تغيير كلمة المرور - SecondsCard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0f1a;
            color: #f1f5f9;
            font-family: 'Tajawal', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #111827;
            border: 1px solid #1e2d42;
            border-radius: 16px;
            padding: 36px 28px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo span {
            font-size: 22px;
            font-weight: 800;
            color: white;
        }
        .logo span b { color: #f97316; }
        h2 {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            color: #f1f5f9;
        }
        .field { margin-bottom: 18px; }
        .field label {
            display: block;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 7px;
        }
        .input-wrap {
            position: relative;
        }
        .input-wrap input {
            width: 100%;
            padding: 11px 42px 11px 14px;
            background: #0d1424;
            border: 1px solid #1e2d42;
            border-radius: 9px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-wrap input:focus { border-color: #f97316; }
        .input-wrap i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 13px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 9px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: opacity 0.2s;
            margin-top: 4px;
        }
        .btn:hover { opacity: 0.88; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .msg {
            text-align: center;
            font-size: 13px;
            margin-top: 16px;
            padding: 10px;
            border-radius: 8px;
            display: none;
        }
        .msg.success { background: rgba(34,197,94,0.12); color: #22c55e; border: 1px solid rgba(34,197,94,0.25); }
        .msg.error   { background: rgba(239,68,68,0.12);  color: #ef4444; border: 1px solid rgba(239,68,68,0.25); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <span>Seconds<b>Card</b></span>
        </div>
        <h2><i class="fas fa-lock" style="color:#f97316;margin-left:8px;"></i> تعيين كلمة مرور جديدة</h2>

        <div class="field">
            <label>كلمة المرور الجديدة</label>
            <div class="input-wrap">
                <i class="fas fa-key"></i>
                <input type="password" id="new-pass" placeholder="أدخل كلمة المرور الجديدة">
            </div>
        </div>

        <div class="field">
            <label>تأكيد كلمة المرور</label>
            <div class="input-wrap">
                <i class="fas fa-check"></i>
                <input type="password" id="confirm-pass" placeholder="أعد إدخال كلمة المرور">
            </div>
        </div>

        <button class="btn" id="save-btn" onclick="savePassword()">
            <i class="fas fa-save"></i> حفظ كلمة المرور
        </button>

        <div class="msg" id="msg"></div>
    </div>

    <script type="module">
        import { supabase } from './js/supabase-config.js';

        window.savePassword = async function() {
            const newPass     = document.getElementById('new-pass').value.trim();
            const confirmPass = document.getElementById('confirm-pass').value.trim();
            const btn         = document.getElementById('save-btn');
            const msg         = document.getElementById('msg');

            msg.style.display = 'none';

            if (!newPass || newPass.length < 6) {
                showMsg('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            if (newPass !== confirmPass) {
                showMsg('كلمتا المرور غير متطابقتين', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'جاري الحفظ...';

            const { error } = await supabase.auth.updateUser({ password: newPass });

            if (error) {
                showMsg('❌ خطأ: ' + error.message, 'error');
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-save"></i> حفظ كلمة المرور';
                return;
            }

            showMsg('✅ تم تغيير كلمة المرور بنجاح! سيتم توجيهك...', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 2500);
        };

        function showMsg(text, type) {
            const msg = document.getElementById('msg');
            msg.textContent = text;
            msg.className = 'msg ' + type;
            msg.style.display = 'block';
        }
    </script>
</body>
</html>
