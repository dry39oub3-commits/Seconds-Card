<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.cloudflare.com https://fonts.gstatic.com data:; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api.anthropic.com https://cdn.jsdelivr.net; media-src 'self' blob:; worker-src 'self' blob:; frame-src 'self';">
 
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Store-Card</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/chat-float.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<link rel="icon" type="image/png" href="assets/Icon.png">    
</head>
<body>

    <header class="main-header">
        <div class="header-container">
<a href="index.html" class="logo-link" style="text-decoration:none;">
    <div class="logo" style="display:flex; align-items:center; gap:10px;">
        <img src="assets/Icon.png" alt="Store-Card" style="height:40px; width:40px; object-fit:contain;">
        <div style="display:flex; flex-direction:column; line-height:1.1;">
            <span style="font-size:18px; font-weight:800; color:white;">Store<span style="color:#f97316;">Card</span></span>
        </div>
    </div>
</a>
            
            <div class="search-container">
                <div class="search-bar">
                    <input type="text" id="main-search" placeholder="ابحث عن بطاقة...">
                    <button><i class="fas fa-search"></i></button>
                </div>
            </div>

            <div class="header-actions">
                <button id="settings-btn" class="action-btn" onclick="openSettingsModal()">
                    <i class="fas fa-globe"></i>
                </button>
                <button id="theme-toggle" class="action-btn"><i class="fas fa-moon"></i></button>
                <a href="cart.html" class="action-btn"><i class="fas fa-shopping-cart"></i></a>

                <div class="user-menu-container">
                    <button class="action-btn" id="user-icon-btn">
                        <i class="fas fa-user-circle"></i>
                    </button>
                    <div class="dropdown-menu" id="user-dropdown">
                        <nav class="dropdown-nav">
                            <a href="orders.html"><i class="fas fa-box"></i> طلباتي</a>
                            <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                            <a href="profile.html"><i class="fas fa-user"></i> حسابي</a>
                            <hr>
                            <button onclick="handleLogout()" class="logout-btn">
                                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
                            </button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- ===== SLIDER ===== -->
    <div class="hero-slider">
        <div class="slides-wrapper" id="slidesWrapper">

            <div class="slide slide-1">
                <h2></h2>
                <p></p>
                <a href=""> </a>
            </div>

            <div class="slide slide-2">
                <h2></h2>
                <p></p>
                <a href=""> </a>
            </div>

            <div class="slide slide-3">
                <h2></h2>
                <p></p>
                <a href=""> </a>
            </div>

        </div>

        <button class="slider-btn slider-prev" id="sliderPrev">
            <i class="fas fa-chevron-right"></i>
        </button>
        <button class="slider-btn slider-next" id="sliderNext">
            <i class="fas fa-chevron-left"></i>
        </button>

        <div class="slider-dots" id="sliderDots"></div>
    </div>

    <main class="container">
        <div id="cards-grid" class="cards-grid"></div>
    </main>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="toggleChatWidget()" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/public-header.js"></script>
    <script type="module" src="js/index.js"></script>
<script type="module" src="js/chat-float.js"></script>
</body>
</html>
