<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | Seconds-Card</title>
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <a href="index.html" class="logo-link">
                <div class="logo">Seconds<span>Card</span></div>
            </a>
            <h2>انضم إلينا</h2>
            <p>أنشئ حسابك وابدأ بشحن بطاقاتك المفضلة</p>
            <form id="register-form">
                <div class="input-group">
                    <label>الاسم الكامل</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="reg-name" placeholder="أدخل اسمك الكامل" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>رقم الهاتف</label>
                    <div class="input-wrapper">
                        <i class="fas fa-phone"></i>
                        <input type="tel" id="reg-phone" placeholder="32XXXXXX" required>
                    </div>
                </div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="reg-pass" placeholder="كلمة مرور قوية (6 أحرف على الأقل)" required>
                    </div>
                </div>
                <button type="submit" id="register-btn">إنشاء الحساب</button>
            </form>
            <div class="login-footer">
                لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
            </div>
        </div>
    </div>
    <script type="module" src="js/register.js"></script>
</body>
</html>
