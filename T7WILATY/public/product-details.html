<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seconds-Card</title>
    <link rel="icon" type="image/png" href="assets/Icon.png">    

    <link rel="stylesheet" href="css/index.css">
    <link rel="stylesheet" href="css/chat-float.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
            <style>
                .product-page { max-width: 800px; margin: 40px auto; padding: 20px; }
                .product-header { display: flex; gap: 30px; align-items: center; background: var(--card-bg, #1e293b); border-radius: 20px; padding: 30px; margin-bottom: 30px; overflow: hidden; min-width: 0; }
                .product-header img { 
    width: 110px; 
    height: 110px; 
    object-fit: cover;      /* تملأ الإطار بالكامل */
    border-radius: 15px; 
    background: white; 
    padding: 0;             /* إزالة الـ padding */
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
                .product-header h1 { 
            font-size: 20px; 
            margin-bottom: 8px; 
            word-break: keep-all;
            white-space: normal;
        }
                .product-header .country { color: #888; font-size: 14px; }
                .prices-title { font-size: 18px; margin-bottom: 15px; }
                .prices-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
                .price-card { background: var(--card-bg, #1e293b); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.3s; }
                .price-card:hover, .price-card.selected { border-color: #f97316; }
                .price-card .label { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
                .price-card .value { font-size: 20px; color: #f97316; font-weight: bold; }
                .add-to-cart-btn { display: block; width: 100%; margin-top: 25px; padding: 15px; background: #f97316; color: white; border: none; border-radius: 12px; font-size: 18px; cursor: pointer; transition: 0.3s; }
                .add-to-cart-btn:hover { background: #ea6c0a; }
                .add-to-cart-btn:disabled { background: #555; cursor: not-allowed; }

                .action-buttons {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .add-to-cart-btn {
            flex: 1;
            padding: 16px;
            background: #f97316;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .buy-now-btn {
            flex: 1;
            padding: 16px;
            background: #22c55e;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .add-to-cart-btn:disabled,
        .buy-now-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .add-to-cart-btn:hover:not(:disabled),
        .buy-now-btn:hover:not(:disabled) {
            opacity: 0.85;
        }

        .step-link {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: linear-gradient(135deg, rgba(249,115,22,0.15), rgba(249,115,22,0.05));
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            text-decoration: none;
            margin: 0 4px;
            transition: all 0.2s;
            box-shadow: 0 0 8px rgba(249,115,22,0.2);
        }

        .step-link:hover {
            background: var(--accent);
            color: rgb(39, 196, 65);
            box-shadow: 0 0 14px rgba(58, 8, 116, 0.4);
        }

        .step-link i {
            font-size: 10px;
        }


            </style>
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <a href="index.html" class="logo-link">
    <div class="logo">
        <img src="assets/Icon.png" alt="SecondsCard" style="height:40px; width:40px; object-fit:contain; border-radius:8px; margin-right:8px; vertical-align:middle;">
        Seconds<span>Card</span>
    </div>
</a>
            <div class="header-actions">
                <button id="theme-toggle" class="action-btn"><i class="fas fa-moon"></i></button>
                <a href="cart.html" class="action-btn"><i class="fas fa-shopping-cart"></i></a>
                <div class="user-menu-container">
                    <button class="action-btn" id="user-icon-btn"><i class="fas fa-user-circle"></i></button>
                    <div class="dropdown-menu" id="user-dropdown">
                        <nav class="dropdown-nav">
                            <a href="orders.html"><i class="fas fa-box"></i> طلباتي</a>
                            <a href="wallet.html"><i class="fas fa-wallet"></i> المحفظة</a>
                            <a href="profile.html"><i class="fas fa-user"></i> حسابي</a>
                            <hr>
                            <button onclick="handleLogout()" class="logout-btn"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                        </nav>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="product-page">
        <div id="product-content">
            <p style="text-align:center; padding:50px;">جاري التحميل...</p>
        </div>
    </main>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="toggleChatWidget()" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/chat-float.js"></script>
    <script type="module" src="js/product-details.js"></script>
</body>
</html>
