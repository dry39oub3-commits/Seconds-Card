            <style>
.product-page { max-width: 800px; margin: 40px auto; padding: 20px; }

/* ── بطاقة المنتج الرئيسية ── */
.product-header {
    display: flex;
    gap: 20px;
    align-items: flex-start;
    background: var(--card-bg, #1e293b);
    border-radius: 20px;
    padding: 24px;
    margin-bottom: 28px;
    border: 1px solid rgba(255,255,255,0.06);
}

.product-header img {
    width: 110px;
    height: 110px;
    object-fit: cover;
    border-radius: 14px;
    background: #0f172a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    flex-shrink: 0;
}

.product-header h1 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
    color: var(--text, #f1f5f9);
    line-height: 1.3;
}

.product-header .country {
    font-size: 13px;
    color: #64748b;
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 12px;
}

.stock-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(34,197,94,0.1);
    color: #22c55e;
    border: 1px solid rgba(34,197,94,0.25);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.stock-badge::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    animation: blink 2s infinite;
}

@keyframes blink {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.3; }
}

/* ── عنوان القسم ── */
.prices-title {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 14px;
}

/* ── شبكة الأسعار ── */
.prices-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
}

.price-card {
    background: var(--card-bg, #1e293b);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
}

.price-card:hover {
    border-color: rgba(249,115,22,0.4);
    background: rgba(249,115,22,0.04);
    transform: translateY(-2px);
}

.price-card.selected {
    border: 2px solid #f97316;
    background: rgba(249,115,22,0.08);
}

/* علامة ✓ في الزاوية */
.price-card.selected::before {
    content: '✓';
    position: absolute;
    top: 0;
    right: 0;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 28px 28px 0;
    border-color: transparent #f97316 transparent transparent;
}

.price-card.selected::after {
    content: '✓';
    position: absolute;
    top: 2px;
    right: 2px;
    font-size: 9px;
    color: white;
    font-weight: 800;
    line-height: 1;
}

.price-card .label {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 8px;
    font-weight: 500;
}

.price-card .value {
    font-size: 24px;
    font-weight: 700;
    color: #f97316;
    line-height: 1;
    margin-bottom: 4px;
}

.price-card .currency {
    font-size: 11px;
    color: #64748b;
    letter-spacing: 0.5px;
}

/* ── أزرار الإجراء ── */
.action-buttons {
    display: flex;
    gap: 12px;
}

.add-to-cart-btn {
    flex: 1;
    padding: 15px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 14px;
    color: var(--text, #f1f5f9);
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
}

.add-to-cart-btn:hover:not(:disabled) {
    background: rgba(255,255,255,0.09);
    border-color: rgba(255,255,255,0.2);
}

.buy-now-btn {
    flex: 1;
    padding: 15px;
    background: #f97316;
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(249,115,22,0.3);
}

.buy-now-btn:hover:not(:disabled) {
    opacity: 0.88;
    transform: translateY(-1px);
    box-shadow: 0 6px 26px rgba(249,115,22,0.4);
}

.add-to-cart-btn:disabled,
.buy-now-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
}

/* ── خطوات الاستخدام ── */
.steps-box {
    background: var(--card-bg, #1e293b);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 16px;
    padding: 20px;
    margin-top: 24px;
}

.steps-title {
    font-size: 13px;
    color: #64748b;
    font-weight: 600;
    margin-bottom: 14px;
}

.step-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(249,115,22,0.1);
    color: #f97316;
    border: 1px solid rgba(249,115,22,0.3);
    padding: 3px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    text-decoration: none;
    margin: 0 4px;
    transition: background 0.2s;
}

.step-link:hover {
    background: rgba(249,115,22,0.2);
}

/* ── موبايل ── */
@media (max-width: 600px) {
    .product-header { flex-direction: column; align-items: flex-start; gap: 16px; padding: 18px; }
    .product-header img { width: 80px; height: 80px; }
    .product-header h1 { font-size: 18px; }
    .prices-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
    .price-card { padding: 16px 12px; }
    .price-card .value { font-size: 20px; }
    .action-buttons { flex-direction: column; }
    .add-to-cart-btn, .buy-now-btn { padding: 14px; }
}
