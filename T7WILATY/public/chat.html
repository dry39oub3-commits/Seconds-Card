<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الدردشة - SecondsCard</title>
    <link rel="stylesheet" href="css/chat-float.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-base:        #0a0f1a;
            --bg-card:        #111827;
            --bg-input:       #0d1424;
            --bg-hover:       #1a2535;
            --border:         #1e2d42;
            --text-primary:   #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted:     #475569;
            --accent:         #f97316;
            --radius-sm:      8px;
            --radius-md:      12px;
            --radius-lg:      16px;
        }

        [data-theme="light"] {
            --bg-base:        #f0f4f8;
            --bg-card:        #ffffff;
            --bg-input:       #f8fafc;
            --bg-hover:       #e8eef5;
            --border:         #d1dce8;
            --text-primary:   #1e293b;
            --text-secondary: #475569;
            --text-muted:     #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg-base);
            color: var(--text-primary);
            font-family: 'Tajawal', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .chat-page {
            max-width: 700px;
            margin: 32px auto;
            padding: 0 16px 40px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .chat-header-icon {
            width: 42px;
            height: 42px;
            background: rgba(249,115,22,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 18px;
        }

        .chat-header h1 {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-primary);
        }

        .chat-header p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .chat-container {
            display: flex;
            flex-direction: column;
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            min-height: 500px;
        }

        #chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 420px;
            max-height: 420px;
        }

        #chat-messages::-webkit-scrollbar { width: 4px; }
        #chat-messages::-webkit-scrollbar-track { background: transparent; }
        #chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

        .chat-bubble {
            max-width: 72%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 14px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            line-height: 1.6;
            word-break: break-word;
        }

        .chat-bubble small {
            font-size: 10px;
            opacity: 0.6;
            align-self: flex-end;
        }

        .bubble-user {
            background: var(--accent);
            color: white;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .bubble-admin {
            background: var(--bg-hover);
            color: var(--text-primary);
            border: 1px solid var(--border);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .bubble-label {
            font-size: 10px;
            font-weight: 700;
            opacity: 0.7;
            margin-bottom: 2px;
        }

        .empty-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 10px;
            font-size: 14px;
        }

        .empty-chat i { font-size: 36px; opacity: 0.3; }

        .chat-input-row {
            display: flex;
            gap: 8px;
            padding: 12px 14px;
            border-top: 1px solid var(--border);
            background: var(--bg-input);
        }

        .chat-input-row input {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 14px;
            font-family: inherit;
            direction: rtl;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input-row input:focus {
            border-color: var(--accent);
        }

        .chat-input-row input::placeholder { color: var(--text-muted); }

        .send-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 15px;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover { opacity: 0.85; }
        .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .loading-chat {
            text-align: center;
            color: var(--text-muted);
            font-size: 13px;
            padding: 40px;
        }

        @media (max-width: 600px) {
            .chat-page { margin: 16px auto; padding: 0 12px 20px; }
            #chat-messages { min-height: 340px; max-height: 340px; }
        }
    </style>
</head>
<body>
    <div class="chat-page">
        <div class="chat-header">
            <div class="chat-header-icon">
                <i class="fas fa-headset"></i>
            </div>
            <div>
                <h1>الدعم الفني <span class="online-dot"></span></h1>
                <p>تواصل مع فريق الدعم مباشرةً</p>
            </div>
        </div>

        <div class="chat-container">
            <div id="chat-messages">
                <div class="loading-chat">
                    <i class="fas fa-spinner fa-spin"></i> جاري التحميل...
                </div>
            </div>
            <form id="chat-form" class="chat-input-row">
                <button type="submit" class="send-btn" id="send-btn">
                    <i class="fas fa-paper-plane"></i>
                </button>
                <input id="chat-input" type="text" placeholder="اكتب رسالتك..." autocomplete="off" maxlength="500">
            </form>
        </div>
    </div>
 <!-- زر الدردشة العائم -->
   <div id="chat-float-btn" 
     onclick="window.location.href='chat.html'" 
     title="تواصل مع الدعم الفني">
    <i class="fas fa-headset"></i>
    <span class="chat-float-badge" id="chat-float-badge"></span>
</div>
<script type="module" src="js/chat-float.js"></script>
    <script type="module" src="js/chat.js"></script>
</body>
</html>
