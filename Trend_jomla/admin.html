<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة التحكم - إضافة منتجات</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form { background: #f4f4f4; padding: 20px; border-radius: 10px; max-width: 500px; margin: 20px auto; }
        input { width: 90%; padding: 10px; margin: 5px 0; border-radius: 5px; border: 1px solid #ddd; }
        button { background: #797c1f; color: white; padding: 10px 20px; border: none; cursor: pointer; width: 100%; }
        .delete-btn { background: #c0392b; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="admin-form">
        <h2>➕ إضافة منتج جديد</h2>
        <input type="text" id="pTitle" placeholder="اسم المنتج">
        <input type="text" id="pPrice" placeholder="السعر (مثلاً: 50 ريال)">
        <input type="text" id="pLink" placeholder="رابط الأفلييت">
       <label for="pImg" style="display: block; margin-bottom: 5px;">اختر صورة من المعرض:</label>
<input type="file" id="pImg" accept="image/*">
        <button onclick="addProduct()">حفظ المنتج ونشره</button>
    </div>

    <div id="adminDisplay" class="product-grid"></div>

    <script src="script.js"></script>
    <script>
        // تشغيل عرض المنتجات للإدارة عند الفتح
        window.onload = displayAdminProducts;
    </script>
</body>
</html>
